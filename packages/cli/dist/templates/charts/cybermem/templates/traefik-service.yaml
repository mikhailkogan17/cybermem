apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-lb
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: web
      protocol: TCP
      name: http
    - port: {{ .Values.global.traefik.port }}
      targetPort: web
      protocol: TCP
      name: web
  selector:
    app.kubernetes.io/name: traefik
