apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-{{ .Values.global.openmemory.serviceName }}
spec:
  type: {{ .Values.openmemory.service.type }}
  ports:
    - port: {{ .Values.global.openmemory.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ .Values.global.openmemory.serviceName }}
