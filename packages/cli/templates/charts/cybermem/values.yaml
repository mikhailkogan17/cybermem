# Default values for cybermem.

# Global settings for SSoT
global:
  traefik:
    port: 8626
  openmemory:
    serviceName: "openmemory"
    port: 8080
  dashboard:
    serviceName: "dashboard"
    port: 3000

openmemory:
  image:
    repository: ghcr.io/mikhailkogan17/cybermem-mcp
    pullPolicy: Always
    tag: "latest"
  replicaCount: 1
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
  env: {}

dashboard:
  image:
    repository: ghcr.io/mikhailkogan17/cybermem-dashboard
    pullPolicy: IfNotPresent
    tag: "latest"
  replicaCount: 1
  service:
    type: ClusterIP
    nodePort: 30000 # For k3d/local access if needed
  resources: {}

env:
  # Shared secrets
  OPENMEMORY_API_KEY: "dev-secret-key"
  OPENAI_API_KEY: ""
