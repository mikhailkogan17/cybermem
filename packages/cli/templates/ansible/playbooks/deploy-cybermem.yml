---
- name: Deploy CyberMem to Raspberry Pi
  hosts: rpi
  become: yes
  vars:
    project_dir: /home/{{ ansible_user }}/cybermem
    env_file: .env.rpi

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - git
          - rsync
        state: present

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Copy Docker Compose template
      copy:
        src: "../../docker-compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Ensure .env is present (template if missing)
      copy:
        content: |
          CYBERMEM_INSTANCE=rpi
          # Add other envs as needed
        dest: "{{ project_dir }}/.env"
        force: no
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Pull latest images from GHCR
      command: docker-compose pull
      args:
        chdir: "{{ project_dir }}"

    - name: Start services
      command: docker-compose up -d --remove-orphans
      args:
        chdir: "{{ project_dir }}"

    - name: Wait for service health (Traefik/Gateway)
      uri:
        url: "http://localhost:8626/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5

    - name: Verify Dashboard Version
      uri:
        url: "http://localhost:8626/api/settings"
        return_content: yes
      register: settings_info
      failed_when: "'v0.11' not in settings_info.content"

    - name: Deployment Summary
      debug:
        msg: "CyberMem {{ (settings_info.content | from_json).dashboardVersion }} successfully deployed to {{ ansible_host }}"
