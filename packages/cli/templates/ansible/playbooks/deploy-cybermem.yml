---
- name: Deploy CyberMem to Raspberry Pi
  hosts: all
  become: true
  vars:
    project_dir: /home/{{ ansible_user }}/cybermem
    env_file: .env.rpi
    # Default ports based on environment
    TRAEFIK_PORT_STAGING: "8625"
    TRAEFIK_PORT_PROD: "8626"
    TRAEFIK_PORT_DEFAULT: "{{ TRAEFIK_PORT_STAGING if cybermem_env | default('prod') == 'staging' else TRAEFIK_PORT_PROD }}"
    # Port to use consistently across all tasks
    EFFECTIVE_TRAEFIK_PORT: "{{ TRAEFIK_PORT | default(TRAEFIK_PORT_DEFAULT) }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - git
          - rsync
        state: present

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure backup directory exists
      file:
        path: "{{ project_dir }}/backups"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure secrets directory exists
      file:
        path: "{{ project_dir }}/secrets"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Check if API key secret file exists
      stat:
        path: "{{ project_dir }}/secrets/om_api_key"
      register: api_key_file

    - name: Generate new API token if not provided and not exists
      set_fact:
        auto_generated_token: "sk-{{ lookup('pipe', 'openssl rand -hex 16') }}"
        auto_generated_id: "{{ lookup('pipe', 'openssl rand -hex 8') }}"
        auto_generated_name: "ansible-auto-generated"
      when: (auth_token_value is not defined or auth_token_value == '') and not api_key_file.stat.exists

    - name: Generate token hash for auto-generated token
      shell: |
        python3 -c "import hashlib, binascii; salt = hashlib.sha256(b'cybermem-salt-v1').hexdigest()[:16]; h = hashlib.pbkdf2_hmac('sha512', '{{ auto_generated_token }}'.encode(), salt.encode(), 100000, 64); print(binascii.hexlify(h).decode())"
      register: auto_generated_hash_result
      when: auto_generated_token is defined
      changed_when: false

    - name: Set auto-generated token hash
      set_fact:
        auto_generated_hash: "{{ auto_generated_hash_result.stdout }}"
      when: auto_generated_hash_result is not skipped

    - name: Use auto-generated token if available
      set_fact:
        final_token_value: "{{ auth_token_value | default(auto_generated_token) }}"
        final_token_hash: "{{ auth_token_hash | default(auto_generated_hash) }}"
        final_token_id: "{{ auth_token_id | default(auto_generated_id) }}"
        final_token_name: "{{ auth_token_name | default(auto_generated_name) }}"
      when: auth_token_value is defined or auto_generated_token is defined

    - name: Write API Key Secret File
      copy:
        content: "{{ final_token_value }}"
        dest: "{{ project_dir }}/secrets/om_api_key"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: final_token_value is defined and not api_key_file.stat.exists

    - name: Display auto-generated token (SAVE THIS!)
      debug:
        msg: |
          ⚠️  AUTO-GENERATED SECURITY TOKEN (SAVE THIS!):
          Token: {{ auto_generated_token }}
          
          This token was automatically generated because no token was provided.
          Save this token securely - you'll need it to configure MCP clients.
          This token will also be shown in the Dashboard Settings after deployment.
      when: auto_generated_token is defined

    - name: Ensure data directory exists
      file:
        path: "{{ project_dir }}/data"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Check if database exists
      stat:
        path: "{{ project_dir }}/data/openmemory.sqlite"
      register: db_file

    - name: Create pre-deploy database backup
      shell: "cp {{ project_dir }}/data/openmemory.sqlite {{ project_dir }}/backups/openmemory.sqlite.{{ ansible_facts['date_time']['iso8601_basic_short'] }}.bak"
      when: db_file.stat.exists
      ignore_errors: true

    - name: Copy Docker Compose template
      copy:
        src: "../../docker-compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Replace GHCR image tag (staging uses :staging, prod uses :latest)
      replace:
        path: "{{ project_dir }}/docker-compose.yml"
        regexp: "(ghcr.io/[^/]+/cybermem-[^:]+):latest"
        replace: '\1:{{ ghcr_tag | default("latest") }}'
      when: ghcr_tag is defined and ghcr_tag != 'latest'

    - name: Sync monitoring configuration
      synchronize:
        src: "../../monitoring"
        dest: "{{ project_dir }}/"
        recursive: true
        delete: true

    # NOTE: build_from_source removed - all builds happen on GH Actions now

    - name: Patch Traefik configuration
      replace:
        path: "{{ project_dir }}/monitoring/traefik/traefik.yml"
        regexp: 'address: ":8626"'
        replace: 'address: ":{{ EFFECTIVE_TRAEFIK_PORT }}"'

    - name: Ensure .env is present (template if missing)
      copy:
        content: |
          CYBERMEM_INSTANCE=rpi
          CYBERMEM_ENV={{ cybermem_env | default('prod') }}
          PROJECT_NAME={{ PROJECT_NAME | default('cybermem') }}
          TRAEFIK_PORT={{ EFFECTIVE_TRAEFIK_PORT }}
          CYBERMEM_TAILSCALE={{ CYBERMEM_TAILSCALE | default('false') }}
          SECRETS_DIR={{ project_dir }}/secrets
          DATA_DIR={{ project_dir }}/data
          CYBERMEM_ENV_PATH={{ project_dir }}/.env
          CYBERMEM_HOME={{ project_dir }}
          # Add other envs as needed
        dest: "{{ project_dir }}/.env"
        force: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Load global version from package.json
      set_fact:
        global_version: "{{ (lookup('file', playbook_dir + '/../../../../../package.json') | from_json).version }}"

    - name: Pull images from GHCR
      command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} pull
      args:
        chdir: "{{ project_dir }}"
      register: pull_out
      changed_when: "'Downloaded newer image' in pull_out.stdout or 'Downloaded newer image' in pull_out.stderr"
      when: not (skip_pull | default(false) | bool)

    - name: Stop staging containers (prevent port conflicts)
      shell: |
        docker-compose -p cybermem-staging down --remove-orphans 2>/dev/null || true
      args:
        chdir: "{{ project_dir }}"
      changed_when: false
      ignore_errors: true
      when: cybermem_env | default('prod') == 'staging'

    - name: Stop current services (Force Clean State)
      command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} down --remove-orphans
      args:
        chdir: "{{ project_dir }}"
      ignore_errors: true

    - name: Start services
      command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} up -d --remove-orphans
      args:
        chdir: "{{ project_dir }}"
      register: up_out
      changed_when: "'Creating' in up_out.stdout or 'Recreating' in up_out.stdout or 'Starting' in up_out.stdout or 'Creating' in up_out.stderr or 'Recreating' in up_out.stderr or 'Starting' in up_out.stderr"

    - name: Install sqlite3 for token injection
      apt:
        name: sqlite3
        state: present

    - name: Inject Authentication Token
      shell: |
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "CREATE TABLE IF NOT EXISTS access_keys (
          id TEXT PRIMARY KEY DEFAULT (lower(hex(randomblob(16)))),
          key_hash TEXT NOT NULL,
          name TEXT DEFAULT 'default',
          user_id TEXT DEFAULT 'default',
          created_at TEXT DEFAULT (datetime('now')),
          last_used_at TEXT,
          is_active INTEGER DEFAULT 1
        );"
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "DELETE FROM access_keys WHERE name='{{ final_token_name }}';"
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "INSERT INTO access_keys (id, key_hash, name, user_id) VALUES ('{{ final_token_id }}', '{{ final_token_hash }}', '{{ final_token_name }}', 'admin');"
      when: final_token_hash is defined
      ignore_errors: true

    - name: Wait for Traefik (Proxy) to be ready
      uri:
        url: "http://localhost:{{ EFFECTIVE_TRAEFIK_PORT }}/ping"
        status_code: 200
      register: traefik_ping
      until: traefik_ping.status == 200
      retries: 10
      delay: 5

    - name: Wait for MCP (App) to be ready
      uri:
        url: "http://localhost:{{ EFFECTIVE_TRAEFIK_PORT }}/health"
        status_code: 200
      register: mcp_health
      until: mcp_health.status == 200
      retries: 30
      delay: 10

    - name: Verify Overall System Health
      uri:
        url: "http://localhost:{{ EFFECTIVE_TRAEFIK_PORT }}/api/health"
      register: health_status
      until: "health_status.json is defined and health_status.json.overall == 'ok'"
      retries: 5
      delay: 10
      ignore_errors: true

    - name: Configure Tailscale Funnel (after health check)
      shell: |
        # Reset any existing configuration for clean state
        tailscale serve reset 2>/dev/null || true
        tailscale funnel reset 2>/dev/null || true

        # Configure port based on current environment only
        if [ "{{ cybermem_env | default('prod') }}" = "staging" ]; then
          tailscale funnel --bg --https=10000 http://127.0.0.1:{{ EFFECTIVE_TRAEFIK_PORT }}
        else
          tailscale funnel --bg --https=443 http://127.0.0.1:{{ EFFECTIVE_TRAEFIK_PORT }}
        fi

        tailscale funnel status
      become: true
      when: (CYBERMEM_TAILSCALE | default('false') | bool) and (health_status is defined and not health_status.failed and (health_status.content | from_json).overall == 'ok')
      register: funnel_status
      ignore_errors: true

    - name: Display Tailscale Funnel Status
      debug:
        var: funnel_status.stdout_lines
      when: funnel_status is defined and funnel_status.stdout_lines is defined

    - name: Automated Rollback on Failure
      block:
        - name: Rollback message
          debug:
            msg: "Rollback logic triggered due to unhealthy state."

        - name: Dump Container Logs (Debug)
          shell: |
            echo "========== TRAEFIK LOGS =========="
            docker logs {{ PROJECT_NAME | default('cybermem') }}-traefik --tail 100 2>&1
            echo "========== MCP SERVER LOGS =========="
            docker logs {{ PROJECT_NAME | default('cybermem') }}-mcp-server --tail 100 2>&1
            echo "========== AUTH SIDECAR LOGS =========="
            docker logs {{ PROJECT_NAME | default('cybermem') }}-auth-sidecar --tail 50 2>&1
          ignore_errors: true

        - name: Restart previous state containers
          command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} up -d --remove-orphans
          args:
            chdir: "{{ project_dir }}"
          ignore_errors: true
      when: (health_status is failed) or (health_status.json is defined and health_status.json.overall != 'ok')

    - name: Deployment Summary
      debug:
        msg: "CyberMem v{{ global_version }} successfully deployed. Health: {{ health_status.json.overall | default('UNKNOWN') }}"
      when: health_status.json is defined
