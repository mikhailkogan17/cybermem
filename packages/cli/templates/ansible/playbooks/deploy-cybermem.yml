---
- name: Deploy CyberMem to Raspberry Pi
  hosts: all
  become: true
  vars:
    project_dir: /home/{{ ansible_user }}/cybermem
    env_file: .env.rpi

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - git
          - rsync
        state: present

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure backup directory exists
      file:
        path: "{{ project_dir }}/backups"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Ensure secrets directory exists
      file:
        path: "{{ project_dir }}/secrets"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Write API Key Secret File
      copy:
        content: "{{ auth_token_value }}"
        dest: "{{ project_dir }}/secrets/om_api_key"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"
      when: auth_token_value is defined
      ignore_errors: true

    - name: Ensure data directory exists
      file:
        path: "{{ project_dir }}/data"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Check if database exists
      stat:
        path: "{{ project_dir }}/data/openmemory.sqlite"
      register: db_file

    - name: Create pre-deploy database backup
      shell: "cp {{ project_dir }}/data/openmemory.sqlite {{ project_dir }}/backups/openmemory.sqlite.{{ ansible_facts['date_time']['iso8601_basic_short'] }}.bak"
      when: db_file.stat.exists
      ignore_errors: true

    - name: Copy Docker Compose template
      copy:
        src: "../../docker-compose.yml"
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Sync monitoring configuration
      synchronize:
        src: "../../monitoring"
        dest: "{{ project_dir }}/"
        recursive: true
        delete: true

    - name: Sync auth-sidecar source (for build_from_source)
      synchronize:
        src: "../../auth-sidecar"
        dest: "{{ project_dir }}/"
        recursive: true
        delete: true
      when: build_from_source | default(false) | bool

    - name: Sync MCP package source (for build_from_source)
      synchronize:
        src: "../../../../../packages/mcp"
        dest: "{{ project_dir }}/packages/"
        recursive: true
        delete: true
      when: build_from_source | default(false) | bool

    - name: Sync Dashboard package source (for build_from_source)
      synchronize:
        src: "../../../../../packages/dashboard"
        dest: "{{ project_dir }}/packages/"
        recursive: true
        delete: true
      when: build_from_source | default(false) | bool

    - name: Patch docker-compose build contexts for staging
      block:
        - name: Patch MCP build context
          replace:
            path: "{{ project_dir }}/docker-compose.yml"
            regexp: 'context: \.\./\.\./mcp'
            replace: "context: ./packages/mcp"
        - name: Patch Dashboard build context
          replace:
            path: "{{ project_dir }}/docker-compose.yml"
            regexp: 'context: \.\./\.\./dashboard'
            replace: "context: ./packages/dashboard"
        - name: Patch auth-sidecar build context
          replace:
            path: "{{ project_dir }}/docker-compose.yml"
            regexp: 'context: \./auth-sidecar'
            replace: "context: ./auth-sidecar"
      when: build_from_source | default(false) | bool

    - name: Patch Traefik configuration
      replace:
        path: "{{ project_dir }}/monitoring/traefik/traefik.yml"
        regexp: 'address: ":8626"'
        replace: 'address: ":{{ TRAEFIK_PORT | default("8626") }}"'

    - name: Ensure .env is present (template if missing)
      copy:
        content: |
          CYBERMEM_INSTANCE=rpi
          CYBERMEM_ENV={{ cybermem_env | default('prod') }}
          PROJECT_NAME={{ PROJECT_NAME | default('cybermem') }}
          TRAEFIK_PORT={{ TRAEFIK_PORT | default('8626') }}
          CYBERMEM_TAILSCALE={{ CYBERMEM_TAILSCALE | default('false') }}
          SECRETS_DIR={{ project_dir }}/secrets
          DATA_DIR={{ project_dir }}/data
          CYBERMEM_ENV_PATH={{ project_dir }}/.env
          CYBERMEM_HOME={{ project_dir }}
          # Add other envs as needed
        dest: "{{ project_dir }}/.env"
        force: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Load global version from package.json
      set_fact:
        global_version: "{{ (lookup('file', playbook_dir + '/../../../../../package.json') | from_json).version }}"

    - name: Build images from source (staging/pre-release)
      shell: |
        set -a
        source {{ project_dir }}/.env
        set +a
        docker-compose -p {{ PROJECT_NAME | default('cybermem') }} build --no-cache 2>&1
      args:
        chdir: "{{ project_dir }}"
        executable: /bin/bash
      when: build_from_source | default(false) | bool
      register: build_out
      ignore_errors: true

    - name: Display build output on failure
      debug:
        var: build_out
      when: build_from_source | default(false) | bool and build_out.failed

    - name: Fail play when build from source fails
      fail:
        msg: "Docker image build from source failed. See 'build_out' debug output above for details."
      when: build_from_source | default(false) | bool and build_out.failed

    - name: Pull latest images from GHCR (production)
      command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} pull
      args:
        chdir: "{{ project_dir }}"
      register: pull_out
      changed_when: "'Downloaded newer image' in pull_out.stdout or 'Downloaded newer image' in pull_out.stderr"
      when: not (build_from_source | default(false) | bool)

    - name: Start services
      command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} up -d --remove-orphans
      args:
        chdir: "{{ project_dir }}"
      register: up_out
      changed_when: "'Creating' in up_out.stdout or 'Recreating' in up_out.stdout or 'Starting' in up_out.stdout or 'Creating' in up_out.stderr or 'Recreating' in up_out.stderr or 'Starting' in up_out.stderr"

    - name: Install sqlite3 for token injection
      apt:
        name: sqlite3
        state: present

    - name: Inject Authentication Token
      shell: |
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "CREATE TABLE IF NOT EXISTS access_keys (
          id TEXT PRIMARY KEY DEFAULT (lower(hex(randomblob(16)))),
          key_hash TEXT NOT NULL,
          name TEXT DEFAULT 'default',
          user_id TEXT DEFAULT 'default',
          created_at TEXT DEFAULT (datetime('now')),
          last_used_at TEXT,
          is_active INTEGER DEFAULT 1
        );"
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "DELETE FROM access_keys WHERE name='{{ auth_token_name | default('ansible-generated') }}';"
        sqlite3 {{ project_dir }}/data/openmemory.sqlite "INSERT INTO access_keys (id, key_hash, name, user_id) VALUES ('{{ auth_token_id }}', '{{ auth_token_hash }}', '{{ auth_token_name | default('ansible-generated') }}', 'admin');"
      when: auth_token_hash is defined
      ignore_errors: true

    - name: Configure Tailscale Funnel (if enabled)
      shell: |
        # Reset any existing configuration
        tailscale serve reset 2>/dev/null || true
        tailscale funnel reset 2>/dev/null || true

        # Configure paths based on environment
        # Staging: /cybermem-staging -> 8625
        # Prod: /cybermem -> 8626
        if [ "{{ cybermem_env | default('prod') }}" = "staging" ]; then
          tailscale funnel --bg --set-path=/cybermem-staging http://127.0.0.1:8625
        else
          tailscale funnel --bg --set-path=/cybermem http://127.0.0.1:8626
        fi

        # Also add the other environment if both ports are running
        if docker ps | grep -q "cybermem-staging"; then
          tailscale funnel --bg --set-path=/cybermem-staging http://127.0.0.1:8625 || true
        fi
        if docker ps | grep -q "cybermem" | grep -v staging; then
          tailscale funnel --bg --set-path=/cybermem http://127.0.0.1:8626 || true
        fi

        tailscale funnel status
      become: true
      when: CYBERMEM_TAILSCALE | default('false') | bool
      register: funnel_status
      ignore_errors: true

    - name: Display Tailscale Funnel Status
      debug:
        var: funnel_status.stdout_lines
      when: funnel_status is defined and funnel_status.stdout_lines is defined

    - name: Wait for Traefik to be ready
      uri:
        url: "http://localhost:{{ TRAEFIK_PORT | default('8626') }}/health"
        status_code: 200
      register: traefik_ping
      until: traefik_ping.status == 200
      retries: 10
      delay: 5

    - name: Verify Overall System Health
      uri:
        url: "http://localhost:{{ TRAEFIK_PORT | default('8626') }}/api/health"
        return_content: true
      register: health_status
      until: "health_status.content is defined and (health_status.content | from_json).overall == 'ok'"
      retries: 5
      delay: 10
      ignore_errors: true

    - name: Configure Tailscale Funnel (after health check)
      shell: |
        # Reset any existing configuration for clean state
        tailscale serve reset 2>/dev/null || true
        tailscale funnel reset 2>/dev/null || true

        # Configure path based on current environment only
        # Staging: /cybermem-staging
        # Prod: /cybermem
        if [ "{{ cybermem_env | default('prod') }}" = "staging" ]; then
          tailscale funnel --bg --set-path=/cybermem-staging http://127.0.0.1:{{ TRAEFIK_PORT | default('8626') }}
        else
          tailscale funnel --bg --set-path=/cybermem http://127.0.0.1:{{ TRAEFIK_PORT | default('8626') }}
        fi

        tailscale funnel status
      become: true
      when: (CYBERMEM_TAILSCALE | default('false') | bool) and (health_status is defined and not health_status.failed and (health_status.content | from_json).overall == 'ok')
      register: funnel_status
      ignore_errors: true

    - name: Display Tailscale Funnel Status
      debug:
        var: funnel_status.stdout_lines
      when: funnel_status is defined and funnel_status.stdout_lines is defined

    - name: Automated Rollback on Failure
      block:
        - name: Rollback message
          debug:
            msg: "Rollback logic triggered due to unhealthy state."

        - name: Restart previous state containers
          command: docker-compose -p {{ PROJECT_NAME | default('cybermem') }} up -d --remove-orphans
          args:
            chdir: "{{ project_dir }}"
          ignore_errors: true
      when: health_status.failed or (health_status.content | from_json).overall != 'ok'

    - name: Deployment Summary
      debug:
        msg: "CyberMem v{{ global_version }} successfully deployed. Health: {{ (health_status.content | from_json).overall | default('UNKNOWN') }}"
