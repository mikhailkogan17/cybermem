apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.yml -o charts/cybermem/templates/ --volumes hostPath
    kompose.version: 1.37.0 (HEAD)
    traefik.enable: "true"
    traefik.http.routers.openmemory.rule: Host(`openmemory.localhost`) || PathPrefix(`/api`)
    traefik.http.services.openmemory.loadbalancer.server.port: "8080"
  labels:
    io.kompose.service: openmemory
  name: openmemory
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: openmemory
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.yml -o charts/cybermem/templates/ --volumes hostPath
        kompose.version: 1.37.0 (HEAD)
        traefik.enable: "true"
        traefik.http.routers.openmemory.rule: Host(`openmemory.localhost`) || PathPrefix(`/api`)
        traefik.http.services.openmemory.loadbalancer.server.port: "8080"
      labels:
        io.kompose.service: openmemory
    spec:
      containers:
        - env:
            - name: OLLAMA_URL
              value: http://ollama:11434
            - name: OM_API_KEY
              value: dev-secret-key
            - name: OM_DB_PATH
              value: /data/openmemory.sqlite
            - name: OM_EMBEDDINGS
              value: ollama
            - name: OM_METADATA_BACKEND
              value: sqlite
            - name: OM_PG_DB
              value: openmemory
            - name: OM_PG_HOST
              value: postgres
            - name: OM_PG_PASSWORD
            - name: OM_PG_PORT
              value: "5432"
            - name: OM_PG_USER
              value: openmemory
            - name: OM_PORT
              value: "8080"
            - name: OM_RATE_LIMIT_ENABLED
              value: "true"
            - name: OM_RATE_LIMIT_MAX_REQUESTS
              value: "100"
            - name: OM_TIER
              value: hybrid
            - name: OM_VECTOR_BACKEND
              value: sqlite
            - name: OPENAI_API_KEY
          image: cybermem-openmemory:latest
          livenessProbe:
            exec:
              command:
                - wget
                - --quiet
                - --tries=1
                - --spider
                - http://localhost:8080/health
            failureThreshold: 3
            initialDelaySeconds: 40
            periodSeconds: 30
            timeoutSeconds: 10
          name: cybermem-openmemory
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - mountPath: /data
              name: openmemory-data
      restartPolicy: Always
      volumes:
        - hostPath:
            path: /Users/mikhailkogan/cybermem
          name: openmemory-data
