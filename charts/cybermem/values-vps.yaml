# VPS production overrides
# For Hetzner CX22 or similar (2 vCPU, 4GB RAM)
# Usage: helm install cybermem charts/cybermem -f charts/cybermem/values-vps.yaml

openmemory:
  replicas: 2  # High availability
  config:
    apiKey: "CHANGE_ME_USE_SEALED_SECRETS"
    embeddings:
      provider: "openai"
      openaiApiKey: "CHANGE_ME_USE_SEALED_SECRETS"
      ollamaUrl: ""
    database:
      backend: "postgres"
      postgres:
        password: "CHANGE_ME_USE_SEALED_SECRETS"

  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi
      cpu: 200m

# Disable Ollama (use OpenAI)
ollama:
  enabled: false

# Enable PostgreSQL for production
postgres:
  enabled: true
  config:
    password: "CHANGE_ME_USE_SEALED_SECRETS"
  resources:
    limits:
      memory: 1Gi
  persistence:
    size: 10Gi

postgresExporter:
  enabled: true

# Monitoring with production settings
prometheus:
  retention: "30d"
  resources:
    limits:
      memory: 512Mi
  persistence:
    size: 10Gi

dashboard:
  resources:
    limits:
      memory: 256Mi
    requests:
      memory: 128Mi
      cpu: 50m

# Ingress for production
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: cybermem.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cybermem-tls
      hosts:
        - cybermem.example.com
