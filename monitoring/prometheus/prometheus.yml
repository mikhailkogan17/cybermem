global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vector'
    static_configs:
      - targets: ['vector:9091']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
