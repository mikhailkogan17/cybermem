global:
  scrape_interval: 15s

scrape_configs:
  # Main metrics source: Database Exporter
  - job_name: 'db-exporter'
    static_configs:
      - targets: ['db-exporter:8000']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
