name: Auto-Generate PR

on:
  push:
    branches:
      - "feat/*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for PR Description
        id: check_desc
        run: |
          if [ -f "PR_DESCRIPTION.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_desc.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head ${{ github.ref_name }} \
            --title "feat: ${{ github.ref_name }} (Agent PR)" \
            --body-file PR_DESCRIPTION.md \
            --draft=false || echo "PR likely already exists"

      - name: Create Generic PR (Fallback)
        if: steps.check_desc.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head ${{ github.ref_name }} \
            --title "feat: ${{ github.ref_name }} (Agent PR)" \
            --body "Automated PR from Agent Work. Review requested from @mikhailkogan17" \
            --draft=false || echo "PR likely already exists"
