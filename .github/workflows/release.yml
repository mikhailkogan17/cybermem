name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write # Required for npm OIDC trusted publishers
  contents: write

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  release:
    needs: e2e
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Bump Versions (all packages)
        id: version
        run: |
          # Bump version in all packages
          for pkg in packages/cli packages/mcp packages/dashboard; do
            cd $pkg
            npm version ${{ inputs.version_type }} --no-git-tag-version
            cd ../..
          done

          # Get version from mcp (entry point)
          NEW_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Build Packages
        run: |
          cd packages/cli && npm run build 2>/dev/null || echo "No build step"
          cd ../..
          cd packages/mcp && npm run build 2>/dev/null || echo "No build step"
          cd ../..
          cd packages/dashboard && npm run build 2>/dev/null || echo "No build step"

      - name: Commit Version Bump
        run: |
          git add packages/*/package.json packages/*/dist/
          git commit -m "release: v${{ steps.version.outputs.version }}"

      - name: Create Tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Push Changes and Tag
        run: |
          git push
          git push --tags

      - name: Publish @cybermem/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Publish @cybermem/mcp
        working-directory: packages/mcp
        run: npm publish --access public --provenance

      - name: Publish @cybermem/dashboard
        working-directory: packages/dashboard
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Post-Release Version Bump
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
            cd $pkg
            npm version patch --no-git-tag-version
            cd ../..
          done
          NEXT_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "Next dev version: $NEXT_VERSION"

      - name: Commit Dev Version
        run: |
          git add packages/*/package.json
          git commit -m "chore: bump to v$(node -p "require('./packages/cli/package.json').version") for development"
          git push
