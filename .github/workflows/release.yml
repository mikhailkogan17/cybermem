name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write # Required for npm OIDC trusted publishers
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        run: npm ci

      - name: Bump Version
        id: version
        working-directory: packages/mcp
        run: |
          npm version ${{ inputs.version_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Build Package
        working-directory: packages/mcp
        run: npm run build 2>/dev/null || echo "No build step"

      - name: Commit Version Bump
        run: |
          git add packages/mcp/package.json packages/mcp/dist/
          git commit -m "release: @cybermem/mcp-server v${{ steps.version.outputs.version }}"

      - name: Create Tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"

      - name: Push Changes and Tag
        run: |
          git push
          git push --tags

      - name: Publish to npm
        working-directory: packages/mcp
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Post-Release Version Bump
        working-directory: packages/mcp
        run: |
          npm version patch --no-git-tag-version
          NEXT_VERSION=$(node -p "require('./package.json').version")
          echo "Next dev version: $NEXT_VERSION"

      - name: Commit Dev Version
        run: |
          git add packages/mcp/package.json
          git commit -m "chore: bump to v$(node -p "require('./packages/mcp/package.json').version") for development"
          git push
