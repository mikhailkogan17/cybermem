name: CyberMem CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dashboard Dependencies
        run: |
          cd packages/dashboard
          npm ci

      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint

      - name: Build Dashboard
        run: |
          cd packages/dashboard
          npm run build
