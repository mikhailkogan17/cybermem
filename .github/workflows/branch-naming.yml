name: Branch Naming Policy

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-branch-name:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Name Pattern
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          # Regex: feature/CM-<digits>-<any text> or chore/CM-<digits>-<any text> or fix/CM-<digits>-<any text>
          # Strict format as per user request (feature/CM-001-descr)
          PATTERN="^(feature|chore|fix)/CM-[0-9]+-.*$"

          if [[ ! "$BRANCH_NAME" =~ $PATTERN ]]; then
            echo "❌ ERROR: Invalid branch name '$BRANCH_NAME'"
            echo "Branch name must follow the pattern: feature/CM-001-description"
            echo "Allowed prefixes: feature/, chore/, fix/"
            exit 1
          fi
          echo "✅ Branch name '$BRANCH_NAME' is valid"
