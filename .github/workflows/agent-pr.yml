name: Agent-PR

on:
  workflow_dispatch:
    inputs:
      head_branch:
        description: "Source Branch (e.g. feat/xyz)"
        required: true
      base_branch:
        description: "Target Branch (e.g. main)"
        required: true
        default: "main"
      title:
        description: "PR Title (Optional - defaults to branch name)"
        required: false
      description:
        description: "PR Description Body"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ inputs.head_branch }}"
          BASE="${{ inputs.base_branch }}"
          TITLE="${{ inputs.title }}"
          DESC="${{ inputs.description }}"

          if [ -z "$TITLE" ]; then
             TITLE="feat: $HEAD (Agent PR)"
          fi

          echo "🚀 Creating PR: $HEAD -> $BASE"
          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "$DESC" \
            --draft=false \
            || echo "⚠️ PR creation failed or already exists."
