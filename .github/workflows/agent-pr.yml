name: Agent-PR

on:
  workflow_dispatch:
    inputs:
      head_branch:
        description: "Source Branch (e.g. feat/xyz)"
        required: true
      base_branch:
        description: "Target Branch (e.g. main)"
        required: true
        default: "main"
      title:
        description: "PR Title (Optional - defaults to branch name)"
        required: false
      description:
        description: "PR Description Body"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ inputs.head_branch }}"
          BASE="${{ inputs.base_branch }}"
          TITLE="${{ inputs.title }}"
          DESC="${{ inputs.description }}"

          # Defaults
          if [ -z "$TITLE" ]; then
             TITLE="feat: $HEAD (Agent PR)"
          fi

          echo "🚀 Creating PR: $HEAD -> $BASE"
          echo "Title: $TITLE"

          PR_URL=$(gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "$DESC" \
            --json url \
            --jq '.url' \
            || gh pr list --head "$HEAD" --base "$BASE" --json url --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
             echo "❌ Failed to identify PR."
             exit 1
          fi

          echo "✅ PR Active: $PR_URL"
          echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT
