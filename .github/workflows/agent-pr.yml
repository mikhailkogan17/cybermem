name: Agent-PR

on:
  workflow_dispatch:
    inputs:
      head_branch:
        description: "Source Branch (e.g. feat/xyz)"
        required: true
      base_branch:
        description: "Target Branch (e.g. main)"
        required: true
        default: "main"
      title:
        description: "PR Title (Optional - defaults to branch name)"
        required: false
      description:
        description: "PR Description Body"
        required: true
  push:
    branches:
      - "feat/**"
      - "fix/**"
      - "chore/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine Inputs (Manual vs Push)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            HEAD="${{ inputs.head_branch }}"
            BASE="${{ inputs.base_branch }}"
            TITLE="${{ inputs.title }}"
            DESC="${{ inputs.description }}"
          else
            # AUTO MODE (Push)
            HEAD="${{ github.ref_name }}"
            BASE="main"

            # Extract Type/Scope from branch for Title (e.g., feat/foo -> feat: foo)
            TYPE=$(echo "$HEAD" | cut -d'/' -f1)
            NAME=$(echo "$HEAD" | cut -d'/' -f2- | tr '-' ' ')
            TITLE="$TYPE: $NAME"

            if [ -f "PR_DESCRIPTION.md" ]; then
              DESC=$(cat PR_DESCRIPTION.md)
            else
              DESC="Auto-generated PR for $HEAD"
            fi

            # If explicit title provided in PR_DESCRIPTION (first line # Title), use it?
            # For now keeping simple.
          fi

          # Safe defaults
          if [ -z "$TITLE" ]; then
             TITLE="feat: $HEAD (Agent PR)"
          fi

          echo "🚀 Creating PR: $HEAD -> $BASE"
          PR_URL=$(gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "$DESC" \
            --json url \
            --jq '.url' \
            || gh pr list --head "$HEAD" --base "$BASE" --json url --jq '.[0].url')

          if [ -z "$PR_URL" ]; then
             echo "❌ Failed to identify PR."
             exit 1
          fi

          echo "✅ PR Active: $PR_URL"
          echo "PR_URL=$PR_URL" >> $GITHUB_OUTPUT

          echo "⏳ Waiting for PR Checks..."
          # Sleep to allow checks to register
          sleep 10
          gh pr checks "$PR_URL" --watch --interval 10 --required --fail-fast || {
            echo "❌ Checks Failed"
            exit 1
          }
          echo "✅ All required checks passed."
