name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 3. E2E Matrix Testing (Parallel Execution)
  # ------------------------------------------------------------------
  pr-e2e-matrix:
    name: "E2E: ${{ matrix.env_name }}"
    needs: pr-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Localhost Staging (port 8625)
          - env_name: "localhost-staging"
            is_staging: true
            use_ci_mode: true
            traefik_port: 8625
            project_name: "cybermem-staging"
            setup_tailscale: false

          # Localhost Production (port 8626)
          - env_name: "localhost-prod"
            is_staging: false
            use_ci_mode: true
            traefik_port: 8626
            project_name: "cybermem-prod"
            setup_tailscale: false

          # RPi Tailscale Staging Emulation (port 8625 + Tailscale)
          - env_name: "rpi-ts-staging"
            is_staging: true
            use_ci_mode: true
            traefik_port: 8625
            project_name: "cybermem-rpi-staging"
            setup_tailscale: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Setup Environment
      - name: Setup CyberMem Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      # Setup Tailscale for RPi emulation
      - name: Setup Tailscale
        if: matrix.setup_tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # Wait for Tailscale node to propagate across tailnet
      - name: Verify Tailscale Connectivity
        if: matrix.setup_tailscale
        run: |
          echo "Waiting for Tailscale node to propagate..."
          # Get this node's DNS name
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "Node DNS: ${MY_DNS}"

          # Ping self to verify node is fully propagated (up to 3 minutes)
          if ! tailscale ping --timeout 180s "${MY_DNS}"; then
            echo "⚠️ Self-ping failed, but continuing..."
            tailscale status
          else
            echo "✅ Tailscale node is ready"
          fi

      # Configure Tailscale Funnel BEFORE deployment
      - name: Configure Tailscale Funnel
        if: matrix.setup_tailscale
        run: |
          echo "=== Tailscale Status BEFORE Funnel ==="
          sudo tailscale status
          echo ""
          
          echo "=== Configuring Tailscale Funnel ==="
          # Use serve first, then funnel (modern two-step approach)
          echo "Step 1: Configure serve..."
          sudo tailscale serve https:8443 / http://127.0.0.1:${{ matrix.traefik_port }}
          
          echo "Step 2: Enable funnel..."
          sudo tailscale funnel --bg 8443
          
          echo ""
          echo "=== Funnel Status ==="
          sudo tailscale funnel status
          
          echo ""
          echo "=== Tailscale Status AFTER Funnel ==="
          sudo tailscale status
          
          echo ""
          echo "=== Network Info ==="
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "Funnel URL should be: https://${MY_DNS}:8443"

      # Build and deploy using CLI (local deployment in CI mode)
      - name: Build CLI & Install (${{ matrix.env_name }})
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          PROJECT_NAME: ${{ matrix.project_name }}
          TRAEFIK_PORT: ${{ matrix.traefik_port }}
        run: |
          npm run build -w @cybermem/cli

          # Deploy using --ci flag (forces local deployment)
          if [ "${{ matrix.is_staging }}" = "true" ]; then
            # Staging deployment
            node packages/cli/dist/index.js install --ci --staging
          else
            # Production deployment
            node packages/cli/dist/index.js install --ci
          fi

          sleep 30

      # Verify Tailscale Funnel is accessible (with retry logic)
      - name: Verify Tailscale Funnel
        if: matrix.setup_tailscale
        run: |
          echo "Verifying Tailscale Funnel is accessible..."
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          FUNNEL_URL="https://${MY_DNS}:8443"

          echo "Funnel URL: ${FUNNEL_URL}"
          echo "Checking health endpoint: ${FUNNEL_URL}/health"
          echo "Will retry every 10 seconds for up to 5 minutes..."
          echo ""
          
          # Retry up to 30 times (10 seconds × 30 = 5 minutes)
          for i in $(seq 1 30); do
            echo "Attempt $i/30..."
            
            # Show verbose output on first and last attempts for debugging
            if [ $i -eq 1 ] || [ $i -eq 30 ]; then
              echo "=== Verbose curl output ==="
              curl -v --max-time 10 "${FUNNEL_URL}/health" 2>&1 || true
              echo ""
            fi
            
            if curl -sf --max-time 10 "${FUNNEL_URL}/health" > /dev/null 2>&1; then
              echo "✅ Tailscale Funnel is accessible (attempt $i/30)"
              echo "   Funnel URL: ${FUNNEL_URL}"
              echo "   (Tests will use this URL to verify authentication)"
              exit 0
            fi
            
            if [ $i -ne 30 ]; then
              echo "⏳ Not accessible yet, waiting 10 seconds..."
              sleep 10
            fi
          done
          
          echo ""
          echo "❌ Funnel failed to become accessible after 5 minutes"
          echo ""
          echo "=== Final Diagnostics ==="
          echo "Funnel status:"
          sudo tailscale funnel status || true
          echo ""
          echo "Serve status:"
          sudo tailscale serve status || true
          echo ""
          echo "Tailscale status:"
          sudo tailscale status || true
          echo ""
          echo "Checking if service is responding locally:"
          curl -v http://127.0.0.1:${{ matrix.traefik_port }}/health 2>&1 || true
          
          exit 1

      - run: npx playwright install --with-deps chromium

      # Determine test URL - use Funnel URL to test authentication!
      - name: Set Test URL
        id: test_url
        run: |
          if [ "${{ matrix.setup_tailscale }}" = "true" ]; then
            # Get Tailscale DNS name for funnel URL
            # CRITICAL: Use Funnel URL to test authentication (localhost bypasses auth!)
            MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
            echo "url=https://${MY_DNS}:8443" >> $GITHUB_OUTPUT
            echo "Using Funnel URL for testing (required for auth verification)"
          else
            echo "url=http://localhost:${{ matrix.traefik_port }}" >> $GITHUB_OUTPUT
            echo "Using localhost URL (no auth testing)"
          fi

      # Run E2E Tests
      - name: Run E2E Verification
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: ${{ steps.test_url.outputs.url }}
          MCP_URL: ${{ steps.test_url.outputs.url }}/mcp
          TEST_ENV_NAME: ${{ matrix.env_name }}

      # Upload environment-specific reports
      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ matrix.env_name }}
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: Remote E2E (actual RPi hardware) is NOT run on PR.
  # It is only run during Release pipeline (publish.yml) after staging verification.
