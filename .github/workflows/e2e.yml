name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger, Version Checks)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 2. Pre-Merge Validation (Changesets, Versions, NPM Dry-Run)
  # ------------------------------------------------------------------
  pr-validation:
    name: "Pre-Merge Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci

      - name: Validate Changeset Configuration
        run: bash scripts/ci/validate-changeset.sh

      - name: Version Consistency Check
        run: bash scripts/ci/check-versions.sh

      - name: NPM Publish Dry-Run
        run: bash scripts/ci/npm-dry-run.sh

      - name: Validation Summary
        if: success()
        run: |
          echo "### ✅ Pre-Merge Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Changeset configuration validated" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Version consistency checked" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ NPM publish dry-run completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All validation gates passed. Ready for E2E tests." >> $GITHUB_STEP_SUMMARY

  # ------------------------------------------------------------------
  # 3. E2E: localhost-staging (port 8625)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-staging:
    name: "E2E: localhost-staging"
    needs: [pr-lint, pr-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - run: npm ci

      - name: Build CLI, MCP & Install
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w packages/cli
          npm run build -w packages/mcp
          # Retry loop to handle transient 502 errors from Docker registry during pull
          for i in {1..3}; do
            node packages/cli/dist/index.js install --staging && break || {
              echo "Install attempt $i failed. Retrying in 15s..."
              sleep 15
            }
          done
          sleep 10

      - name: Wait for Docker stack health
        run: |
          echo "=== Docker container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          echo ""
          echo "=== Waiting for MCP health (max 120s) ==="
          HEALTHY=false
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8625/health > /dev/null 2>&1; then
              echo "✅ MCP health OK after $((i*5))s"
              HEALTHY=true
              break
            fi
            echo "  ⏳ Attempt $i/24 — not ready yet..."
            if [ $i -eq 12 ]; then
              echo "=== Mid-wait diagnostics ==="
              docker ps -a --format 'table {{.Names}}\t{{.Status}}'
              echo "--- MCP server logs ---"
              docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -20 || true
              echo "--- Traefik logs ---"
              docker logs $(docker ps -aq --filter name=traefik) 2>&1 | tail -10 || true
            fi
            sleep 5
          done
          echo ""
          echo "=== Final container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          if [ "$HEALTHY" != "true" ]; then
            echo "❌ MCP health never reached — failing CI"
            docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -40 || true
            exit 1
          fi

      - run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-staging
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # 4. E2E: localhost-prod (port 8626)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-prod:
    name: "E2E: localhost-prod"
    needs: [pr-lint, pr-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - run: npm ci

      - name: Build CLI & Install
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w packages/cli
          npm run build -w packages/mcp
          # Retry loop to handle transient 502 errors from Docker registry during pull
          for i in {1..3}; do
            node packages/cli/dist/index.js install && break || {
              echo "Install attempt $i failed. Retrying in 15s..."
              sleep 15
            }
          done
          sleep 10

      - name: Wait for Docker stack health
        run: |
          echo "=== Docker container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          echo ""
          echo "=== Waiting for MCP health (max 120s) ==="
          HEALTHY=false
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8626/health > /dev/null 2>&1; then
              echo "✅ MCP health OK after $((i*5))s"
              HEALTHY=true
              break
            fi
            echo "  ⏳ Attempt $i/24 — not ready yet..."
            if [ $i -eq 12 ]; then
              echo "=== Mid-wait diagnostics ==="
              docker ps -a --format 'table {{.Names}}\t{{.Status}}'
              echo "--- MCP server logs ---"
              docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -20 || true
              echo "--- Traefik logs ---"
              docker logs $(docker ps -aq --filter name=traefik) 2>&1 | tail -10 || true
            fi
            sleep 5
          done
          echo ""
          echo "=== Final container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          if [ "$HEALTHY" != "true" ]; then
            echo "❌ MCP health never reached — failing CI"
            docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -40 || true
            exit 1
          fi

      - run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8626
          MCP_URL: http://localhost:8626/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-prod
