name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 3. E2E Matrix Testing (Parallel Execution)
  # ------------------------------------------------------------------
  pr-e2e-matrix:
    name: "E2E: ${{ matrix.env_name }}"
    # Run in parallel with pr-lint (no dependency)
    # Danger failure won't block E2E tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Localhost Staging (port 8625)
          - env_name: "localhost-staging"
            is_staging: true
            use_ci_mode: true
            traefik_port: 8625
            project_name: "cybermem-staging"
            setup_tailscale: false

          # Localhost Production (port 8626)
          - env_name: "localhost-prod"
            is_staging: false
            use_ci_mode: true
            traefik_port: 8626
            project_name: "cybermem-prod"
            setup_tailscale: false

          # RPi Tailscale Staging Emulation (port 8625 + Tailscale)
          - env_name: "rpi-ts-staging"
            is_staging: true
            use_ci_mode: true
            traefik_port: 8625
            project_name: "cybermem-rpi-staging"
            setup_tailscale: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Setup Environment
      - name: Setup CyberMem Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: Debug OAuth Secrets
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          echo "Checking TS_OAUTH_CLIENT_ID"
          if [ -z "$TS_OAUTH_CLIENT_ID" ]; then
            echo "::error::TS_OAUTH_CLIENT_ID is empty"
            exit 1
          else
            echo "TS_OAUTH_CLIENT_ID is set (length: ${#TS_OAUTH_CLIENT_ID})"
          fi

          echo "Checking TS_OAUTH_SECRET"
          if [ -z "$TS_OAUTH_SECRET" ]; then
            echo "::error::TS_OAUTH_SECRET is empty"
            exit 1
          else
            echo "TS_OAUTH_SECRET is set (length: ${#TS_OAUTH_SECRET})"
          fi

      # Setup Tailscale for RPi emulation
      - name: Setup Tailscale
        if: matrix.setup_tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          hostname: gha-${{ github.run_id }}
      # Verify Tailscale Connectivity and Network
      - name: Verify Tailscale Connectivity
        if: matrix.setup_tailscale
        run: |
          echo "=== Tailscale Status ==="
          tailscale status --json | jq '.'

          echo ""
          echo "=== Network Check ==="
          tailscale netcheck

          echo ""
          echo "=== Node Info ==="
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "Node DNS: ${MY_DNS}"
          echo "✅ Tailscale connectivity verified"

      # Build and deploy using CLI (local deployment in CI mode)
      - name: Build CLI & Install (${{ matrix.env_name }})
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          PROJECT_NAME: ${{ matrix.project_name }}
          TRAEFIK_PORT: ${{ matrix.traefik_port }}
        run: |
          npm run build -w @cybermem/cli

          # Deploy using --ci flag (forces local deployment)
          if [ "${{ matrix.is_staging }}" = "true" ]; then
            # Staging deployment
            node packages/cli/dist/index.js install --ci --staging
          else
            # Production deployment
            node packages/cli/dist/index.js install --ci
          fi

          sleep 30

      # Wait for local services to be healthy first
      - name: Wait for Services
        if: matrix.setup_tailscale
        run: |
          echo "Waiting for localhost services to be ready..."
          for i in $(seq 1 30); do
            if curl -sf "http://localhost:${{ matrix.traefik_port }}/health" > /dev/null 2>&1; then
              echo "✅ Services are healthy on localhost:${{ matrix.traefik_port }}"
              break
            fi
            echo "⏳ Waiting for services... (attempt $i/30)"
            sleep 5
          done

      # Configure Tailscale Funnel AFTER services are running
      - name: Configure Tailscale Funnel
        if: matrix.setup_tailscale
        run: |
          echo "=== Configuring Tailscale Funnel ==="
          echo "Services are running on localhost:${{ matrix.traefik_port }}"
          echo "Configuring Funnel to expose port 10000 → localhost:${{ matrix.traefik_port }}"
          echo ""

          sudo tailscale funnel --bg --https=10000 http://localhost:${{ matrix.traefik_port }}

          echo ""
          echo "=== Funnel Status ==="
          sudo tailscale funnel status

          echo ""
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "✅ Funnel configured: https://${MY_DNS}:10000 → http://localhost:${{ matrix.traefik_port }}"

          echo ""
          echo "Waiting 2 minutes for DNS/cert propagation..."
          sleep 120

      # Debug DNS resolution
      - name: Debug Funnel DNS
        if: matrix.setup_tailscale
        run: |
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "=== DNS Debug ==="
          echo "DNS: $MY_DNS"
          nslookup $MY_DNS || echo "⚠️  DNS not resolved yet"
          dig $MY_DNS || echo "⚠️  dig failed"

      # Verify Tailscale Funnel is accessible (with retry logic)
      - name: Verify Tailscale Funnel
        if: matrix.setup_tailscale
        run: |
          echo "Verifying Tailscale Funnel is accessible..."
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          FUNNEL_URL="https://${MY_DNS}:10000"

          echo "Funnel URL: ${FUNNEL_URL}"
          echo "Checking health endpoint: ${FUNNEL_URL}/health"
          echo "Will retry every 10 seconds for up to 5 minutes..."
          echo ""

          # Retry up to 30 times (10 seconds × 30 = 5 minutes)
          for i in $(seq 1 30); do
            echo "Attempt $i/30..."

            # Show verbose output on first and last attempts for debugging
            if [ $i -eq 1 ] || [ $i -eq 30 ]; then
              echo "=== Verbose curl output ==="
              curl -v --max-time 10 "${FUNNEL_URL}/health" 2>&1 || true
              echo ""
            fi

            if curl -sf --max-time 10 "${FUNNEL_URL}/health" > /dev/null 2>&1; then
              echo "✅ Tailscale Funnel is accessible (attempt $i/30)"
              echo "   Funnel URL: ${FUNNEL_URL}"
              echo "   (Tests will use this URL to verify authentication)"
              exit 0
            fi

            if [ $i -ne 30 ]; then
              echo "⏳ Not accessible yet, waiting 10 seconds..."
              sleep 10
            fi
          done

          echo ""
          echo "❌ Funnel failed to become accessible after 5 minutes"
          echo ""
          echo "=== Final Diagnostics ==="
          echo "Funnel status:"
          sudo tailscale funnel status || true
          echo ""
          echo "Serve status:"
          sudo tailscale serve status || true
          echo ""
          echo "Tailscale status:"
          sudo tailscale status || true
          echo ""
          echo "Checking if service is responding locally:"
          curl -v http://127.0.0.1:${{ matrix.traefik_port }}/health 2>&1 || true

          exit 1

      - run: npx playwright install --with-deps chromium

      # Determine test URL - use Funnel URL for remote access testing
      - name: Set Test URL
        id: test_url
        run: |
          if [ "${{ matrix.setup_tailscale }}" = "true" ]; then
            # Get Tailscale DNS name for funnel URL
            MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
            echo "url=https://${MY_DNS}:10000" >> $GITHUB_OUTPUT
            echo "Using Funnel URL for remote access testing"
          else
            echo "url=http://localhost:${{ matrix.traefik_port }}" >> $GITHUB_OUTPUT
            echo "Using localhost URL for local testing"
          fi

      # Run E2E Tests
      - name: Run E2E Verification
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: ${{ steps.test_url.outputs.url }}
          MCP_URL: ${{ steps.test_url.outputs.url }}/mcp
          BASE_URL: ${{ steps.test_url.outputs.url }}
          TEST_ENV_NAME: ${{ matrix.env_name }}

      # Upload environment-specific reports
      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ matrix.env_name }}
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: Remote E2E (actual RPi hardware) is NOT run on PR.
  # It is only run during Release pipeline (publish.yml) after staging verification.
