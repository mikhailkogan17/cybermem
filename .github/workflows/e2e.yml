name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 3. E2E Matrix Testing (Parallel Execution)
  # ------------------------------------------------------------------
  pr-e2e-matrix:
    name: "E2E: ${{ matrix.env_name }}"
    # Run in parallel with pr-lint (no dependency)
    # Danger failure won't block E2E tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Localhost Staging (port 8625)
          - env_name: "localhost-staging"
            is_staging: true
            use_ci_mode: true
            traefik_port: 8625
            project_name: "cybermem-staging"
            setup_tailscale: false
            base_url: "http://localhost:8625"

          # Localhost Production (port 8626)
          - env_name: "localhost-prod"
            is_staging: false
            use_ci_mode: true
            traefik_port: 8626
            project_name: "cybermem-prod"
            setup_tailscale: false
            base_url: "http://localhost:8626"

          # RPi LAN Production (via mDNS - raspberrypi.local)
          - env_name: "rpi-lan-prod"
            is_staging: false
            use_ci_mode: false
            traefik_port: 8626
            project_name: "cybermem-prod"
            setup_tailscale: false
            base_url: "http://raspberrypi.local:8626"
            skip_deployment: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Setup Environment
      - name: Setup CyberMem Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      # Build and deploy using CLI (local deployment in CI mode)
      - name: Build CLI & Install (${{ matrix.env_name }})
        if: "!matrix.skip_deployment"
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          PROJECT_NAME: ${{ matrix.project_name }}
          TRAEFIK_PORT: ${{ matrix.traefik_port }}
        run: |
          npm run build -w @cybermem/cli

          # Deploy using --ci flag (forces local deployment)
          if [ "${{ matrix.is_staging }}" = "true" ]; then
            # Staging deployment
            node packages/cli/dist/index.js install --ci --staging
          else
            # Production deployment
            node packages/cli/dist/index.js install --ci
          fi

          sleep 30

      - run: npx playwright install --with-deps chromium

      # Use base URL from matrix configuration
      - name: Set Test URL
        id: test_url
        run: |
          echo "url=${{ matrix.base_url }}" >> $GITHUB_OUTPUT
          echo "Using test URL: ${{ matrix.base_url }}"

      # Run E2E Tests
      - name: Run E2E Verification
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: ${{ steps.test_url.outputs.url }}
          MCP_URL: ${{ steps.test_url.outputs.url }}/mcp
          BASE_URL: ${{ steps.test_url.outputs.url }}
          TEST_ENV_NAME: ${{ matrix.env_name }}

      # Upload environment-specific reports
      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ matrix.env_name }}
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: Remote E2E (actual RPi hardware) is NOT run on PR.
  # It is only run during Release pipeline (publish.yml) after staging verification.
