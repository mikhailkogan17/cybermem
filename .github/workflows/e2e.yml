name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 3. Local E2E (Dogfooding) - "e2e:pr"
  # ------------------------------------------------------------------
  pr-e2e-localhost-staging:
    name: "E2E: Localhost Staging"
    needs: pr-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Setup Environment
      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      # Install Ansible for Runner-as-Staging-Host
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # Verification: Install & Health Check using CLI --ci mode
      - name: Build CLI & Install (CI Staging Mode)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w @cybermem/cli
          # Use --ci --rpi --staging for "Runner-as-Staging-Host" mode
          # This deploys to localhost using Ansible with staging configuration
          node packages/cli/dist/index.js install --ci --rpi --staging
          sleep 30

      - run: npx playwright install --with-deps chromium

      - name: Run E2E Verification (Unified Playwright)
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp

      - name: Upload Playwright Reports (Local)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-local-ci
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: Remote E2E (RPi) is NOT run on PR.
  # It is only run during Release pipeline (publish.yml) on rpi-ts-staging,
  # after which prod is deployed WITHOUT additional tests.
