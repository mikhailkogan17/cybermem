name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger, Version Checks)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 2. Pre-Merge Validation (Changesets, Versions, NPM Dry-Run)
  # ------------------------------------------------------------------
  pr-validation:
    name: "Pre-Merge Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Validate Changeset Configuration
        run: |
          echo "=== Validating .changeset/config.json ==="
          if [ ! -f .changeset/config.json ]; then
            echo "❌ ERROR: .changeset/config.json not found"
            exit 1
          fi
          
          # Validate JSON syntax
          if ! jq empty .changeset/config.json 2>/dev/null; then
            echo "❌ ERROR: Invalid JSON in .changeset/config.json"
            exit 1
          fi
          
          # Validate required fields
          REPO=$(jq -r '.changelog[1].repo // empty' .changeset/config.json)
          if [ -z "$REPO" ]; then
            echo "❌ ERROR: changelog.repo is required in .changeset/config.json"
            exit 1
          fi
          
          # Validate linked packages match workspace packages
          LINKED_PACKAGES=$(jq -r '.linked[0][]' .changeset/config.json 2>/dev/null || echo "")
          if [ -z "$LINKED_PACKAGES" ]; then
            echo "⚠️  WARNING: No linked packages configured"
          else
            echo "✅ Linked packages:"
            echo "$LINKED_PACKAGES" | while read pkg; do
              echo "  - $pkg"
              # Check if package exists
              PKG_NAME=$(echo "$pkg" | sed 's/@cybermem\///')
              if [ ! -d "packages/$PKG_NAME" ]; then
                echo "❌ ERROR: Linked package $pkg does not exist in workspace"
                exit 1
              fi
            done
          fi
          
          echo "✅ Changeset configuration is valid"

      - name: Version Consistency Check
        run: |
          echo "=== Checking version consistency across all packages ==="
          
          CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
          MCP_VERSION=$(node -p "require('./packages/mcp/package.json').version")
          DASHBOARD_VERSION=$(node -p "require('./packages/dashboard/package.json').version")
          ROOT_VERSION=$(node -p "require('./package.json').version")
          
          echo "Versions found:"
          echo "  Root: $ROOT_VERSION"
          echo "  @cybermem/cli: $CLI_VERSION"
          echo "  @cybermem/mcp: $MCP_VERSION"
          echo "  @cybermem/dashboard: $DASHBOARD_VERSION"
          
          # All workspace packages should have the same version (linked packages)
          if [ "$CLI_VERSION" != "$MCP_VERSION" ] || [ "$CLI_VERSION" != "$DASHBOARD_VERSION" ]; then
            echo "❌ ERROR: Package versions are inconsistent!"
            echo "All linked packages must have the same version."
            echo "Run 'npm version <version> --workspaces --no-git-tag-version' to sync versions."
            exit 1
          fi
          
          echo "✅ All package versions are consistent: $CLI_VERSION"

      - name: NPM Publish Dry-Run
        run: |
          echo "=== Running npm publish dry-run ==="
          
          # Build all packages
          npm run build --workspaces
          
          # Dry-run publish for each workspace
          npm publish --workspaces --access public --dry-run
          
          echo "✅ Dry-run publish successful for all packages"

  # ------------------------------------------------------------------
  # 3. E2E: localhost-staging (port 8625)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-staging:
    name: "E2E: localhost-staging"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - run: npm ci

      - name: Build CLI & Install
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w packages/cli
          # Retry loop to handle transient 502 errors from Docker registry during pull
          for i in {1..3}; do
            node packages/cli/dist/index.js install --staging && break || {
              echo "Install attempt $i failed. Retrying in 15s..."
              sleep 15
            }
          done
          sleep 10

      - name: Wait for Docker stack health
        run: |
          echo "=== Docker container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          echo ""
          echo "=== Waiting for MCP health (max 120s) ==="
          HEALTHY=false
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8625/health > /dev/null 2>&1; then
              echo "✅ MCP health OK after $((i*5))s"
              HEALTHY=true
              break
            fi
            echo "  ⏳ Attempt $i/24 — not ready yet..."
            if [ $i -eq 12 ]; then
              echo "=== Mid-wait diagnostics ==="
              docker ps -a --format 'table {{.Names}}\t{{.Status}}'
              echo "--- MCP server logs ---"
              docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -20 || true
              echo "--- Traefik logs ---"
              docker logs $(docker ps -aq --filter name=traefik) 2>&1 | tail -10 || true
            fi
            sleep 5
          done
          echo ""
          echo "=== Final container status ==="
          docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
          if [ "$HEALTHY" != "true" ]; then
            echo "❌ MCP health never reached — failing CI"
            docker logs $(docker ps -aq --filter name=mcp-server) 2>&1 | tail -40 || true
            exit 1
          fi

      - run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-staging
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # 4. E2E: localhost-prod (port 8626)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-prod:
    name: "E2E: localhost-prod"
