name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 2. E2E: localhost-staging (port 8625)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-staging:
    name: "E2E: localhost-staging"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - run: npm ci

      - name: Build CLI & Install
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w packages/cli
          # Retry loop to handle transient 502 errors from Docker registry during pull
          for i in {1..3}; do
            node packages/cli/dist/index.js install --staging && break || {
              echo "Install attempt $i failed. Retrying in 15s..."
              sleep 15
            }
          done
          sleep 30

      - run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-staging
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # 3. E2E: localhost-prod (port 8626)
  #    Identical flow: checkout → npm ci → CLI install → Playwright
  # ------------------------------------------------------------------
  pr-e2e-localhost-prod:
    name: "E2E: localhost-prod"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - run: npm ci

      - name: Build CLI & Install
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w packages/cli
          # Retry loop to handle transient 502 errors from Docker registry during pull
          for i in {1..3}; do
            node packages/cli/dist/index.js install && break || {
              echo "Install attempt $i failed. Retrying in 15s..."
              sleep 15
            }
          done
          sleep 30

      - run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8626
          MCP_URL: http://localhost:8626/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-prod
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7
