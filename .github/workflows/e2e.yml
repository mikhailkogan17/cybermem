name: E2E Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Docker Stack (Local Simulation)
        working-directory: packages/cli/templates
        run: |
          export CYBERMEM_ENV_PATH=$HOME/.cybermem/.env
          docker compose up -d
          sleep 60 # Wait for services to be ready

      - name: Install CLI Dependencies
        working-directory: packages/cli
        run: npm ci

      - name: Run E2E Tests (MCP)
        working-directory: packages/cli
        env:
          OM_API_KEY: sk-test-key-for-ci # gitleaks:allow
        run: npm run test:e2e local

      - name: Install Dashboard Dependencies
        working-directory: packages/dashboard
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: packages/dashboard
        run: npx playwright install --with-deps chromium

        env:
          CI: true
          OM_API_KEY: sk-test-key-for-ci # gitleaks:allow
          DB_EXPORTER_URL: http://127.0.0.1:8000
          PROMETHEUS_URL: http://127.0.0.1:9092
          NEXT_PUBLIC_PROMETHEUS_URL: http://127.0.0.1:9092

      - name: Wait for Exporters (Health Check)
        run: |
          echo "Waiting for DB Exporter..."
          timeout 30s bash -c 'until curl --silent --fail http://127.0.0.1:8000/api/stats; do sleep 2; done'
          echo "DB Exporter is UP"

      - name: Run Playwright Tests (Dashboard)
        working-directory: packages/dashboard
        run: npm run test:e2e -- e2e/auth.spec.ts e2e/metrics.spec.ts
        env:
          CI: true
          OM_API_KEY: sk-test-key-for-ci # gitleaks:allow
          DB_EXPORTER_URL: http://127.0.0.1:8000
          PROMETHEUS_URL: http://127.0.0.1:9092
          NEXT_PUBLIC_PROMETHEUS_URL: http://127.0.0.1:9092
          BASE_URL: http://127.0.0.1:3000

      - name: Wipe Database (Cleanup)
        if: always()
        working-directory: packages/cli
        run: npm run test:e2e -- --wipe-only
        env:
          OM_API_KEY: sk-test-key-for-ci # gitleaks:allow

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/dashboard/playwright-report/
          retention-days: 7
