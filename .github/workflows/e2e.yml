name: E2E & Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # For DangerJS
  packages: read # For ghcr.io access

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger)
  # ------------------------------------------------------------------
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 3. Local E2E (Dogfooding) - "e2e:pr"
  # ------------------------------------------------------------------
  e2e-local:
    name: "E2E: Local (PR)"
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Setup Environment
      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      # Verification: Install & Health Check
      - name: Build CLI & Install (Staging Mode)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w @cybermem/cli
          node packages/cli/dist/index.js install --staging
          sleep 30

      - run: npx playwright install --with-deps chromium

      - name: Run E2E Verification (Unified Playwright)
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp

      - name: Upload Playwright Reports (Local)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-local-ci
          path: |
            packages/*/playwright-report/
            packages/*/test-results/
          retention-days: 7

  # NOTE: Remote E2E (RPi) is NOT run on MR.
  # It is only run during Release pipeline (publish.yml) on rpi-ts-staging,
  # after which prod is deployed WITHOUT additional tests.
