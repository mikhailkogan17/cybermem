name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  packages: read

jobs:
  # ------------------------------------------------------------------
  # 1. Quality Gates (Lint, Danger) — NO DEPENDENCIES
  # ------------------------------------------------------------------
  pr-lint:
    name: "Lint & Danger"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint
      - name: DangerJS
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  # ------------------------------------------------------------------
  # 2. E2E: localhost-staging (port 8625) — NO DEPENDENCIES
  #    Docker backend + Turbopack dashboard on :3000
  # ------------------------------------------------------------------
  pr-e2e-localhost-staging:
    name: "E2E: localhost-staging"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: Build CLI & Install (Staging)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w @cybermem/cli
          node packages/cli/dist/index.js install --staging
          sleep 30

      - run: npx playwright install --with-deps chromium

      # Turbopack dashboard on :3000, Docker backend on :8625
      # Dashboard API reads shared SQLite + proxies to MCP via Traefik
      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8625
          MCP_URL: http://localhost:8625/mcp
          OM_DB_PATH: /home/runner/.cybermem/data-staging/openmemory.sqlite
          INTERNAL_MCP_URL: http://localhost:8625

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-staging
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # 3. E2E: localhost-prod (port 8626) — NO DEPENDENCIES
  #    Full Docker stack (dashboard via Traefik, not Turbopack)
  # ------------------------------------------------------------------
  pr-e2e-localhost-prod:
    name: "E2E: localhost-prod"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: Build CLI & Install (Prod)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w @cybermem/cli
          node packages/cli/dist/index.js install
          sleep 30

      - run: npx playwright install --with-deps chromium

      # All tests go through Docker Traefik on :8626
      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: http://localhost:8626
          MCP_URL: http://localhost:8626/mcp

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-localhost-prod
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------
  # 4. E2E: rpi-ts-staging (port 10000 via Tailscale)
  #    — NO DEPENDENCIES
  #    Runner joins tailnet → deploys staging to RPi → tests
  #    Funnel runs on RPi HOST (not runner)
  # ------------------------------------------------------------------
  pr-e2e-rpi-ts-staging:
    name: "E2E: rpi-ts-staging"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Get RPi Tailscale Info
        id: rpi_info
        run: |
          echo "Waiting for Tailscale connection..."
          for i in {1..12}; do
            sleep 5
            if tailscale status --json >/dev/null 2>&1; then
              echo "✅ Tailscale connected"
              break
            fi
            echo "Waiting... ($i/12)"
          done

          RPI_DNS=$(tailscale status --json | jq -r \
            '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .DNSName' \
            | head -1 | sed 's/\.$//')
          RPI_IP=$(tailscale status --json | jq -r \
            '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' \
            | head -1)

          if [ -z "$RPI_DNS" ] || [ -z "$RPI_IP" ]; then
            echo "❌ Could not find RPi on tailnet"
            tailscale status
            exit 1
          fi

          echo "dns=${RPI_DNS}" >> $GITHUB_OUTPUT
          echo "ip=${RPI_IP}" >> $GITHUB_OUTPUT
          echo "url=https://${RPI_DNS}:10000" >> $GITHUB_OUTPUT
          echo "✅ RPi DNS: ${RPI_DNS}, IP: ${RPI_IP}"
          echo "✅ Staging URL: https://${RPI_DNS}:10000"

      - name: Generate Staging Token
        id: gen_token
        run: |
          TOKEN="sk-$(openssl rand -hex 16)"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

          node -e "
          const crypto = require('crypto');
          const token = '$TOKEN';
          const salt = crypto.randomBytes(16).toString('hex');
          crypto.pbkdf2(token, salt, 100000, 64, 'sha512', (err, key) => {
            if (err) process.exit(1);
            console.log('token_hash=' + salt + ':' + key.toString('hex'));
            console.log('token_id=' + crypto.randomBytes(8).toString('hex'));
          });
          " >> $GITHUB_OUTPUT
          echo "✅ Generated staging E2E token"

      - name: Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Deploy Staging to RPi
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=staging" \
            --extra-vars "ghcr_user=${{ github.actor }}" \
            --extra-vars "ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            --extra-vars "ghcr_tag=staging" \
            --extra-vars "TRAEFIK_PORT=8625" \
            --extra-vars "CYBERMEM_TAILSCALE=true" \
            --extra-vars "auth_token_hash=${{ steps.gen_token.outputs.token_hash }}" \
            --extra-vars "auth_token_id=${{ steps.gen_token.outputs.token_id }}" \
            --extra-vars "auth_token_name=staging-e2e" \
            --extra-vars "auth_token_value=${{ steps.gen_token.outputs.token }}" \
            --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            --extra-vars "ansible_host=${{ steps.rpi_info.outputs.ip }}"

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Wait for RPi Staging Services
        run: |
          STAGING_URL="${{ steps.rpi_info.outputs.url }}"
          echo "Waiting for services at: ${STAGING_URL}/health"
          for i in {1..30}; do
            if curl -sf --max-time 10 "${STAGING_URL}/health" > /dev/null 2>&1; then
              echo "✅ RPi staging services ready"
              break
            fi
            echo "Waiting for services... ($i/30)"
            sleep 10
          done
          curl -sf --max-time 10 "${STAGING_URL}/health" > /dev/null 2>&1 \
            || { echo "❌ RPi staging services not healthy"; exit 1; }

      - name: Run E2E
        run: npx playwright test
        env:
          CI: true
          DASHBOARD_URL: ${{ steps.rpi_info.outputs.url }}
          MCP_URL: ${{ steps.rpi_info.outputs.url }}/mcp
          CYBERMEM_TOKEN: ${{ steps.gen_token.outputs.token }}

      - name: Upload Playwright Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-rpi-ts-staging
          path: |
            playwright-report/
            test-results/
            packages/*/playwright-report/
            packages/*/test-results/
          if-no-files-found: warn
          retention-days: 7
