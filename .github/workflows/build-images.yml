name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - "packages/dashboard/**"
      - "packages/cli/templates/monitoring/**"
      - "packages/cli/templates/auth-sidecar/**"
      - "packages/mcp/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/cybermem

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      mcp: ${{ steps.filter.outputs.mcp }}
      auth: ${{ steps.filter.outputs.auth }}
      exporters: ${{ steps.filter.outputs.exporters }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'packages/dashboard/**'
              - '.github/workflows/build-images.yml'
            mcp:
              - 'packages/mcp/**'
              - '.github/workflows/build-images.yml'
            auth:
              - 'packages/cli/templates/auth-sidecar/**'
              - '.github/workflows/build-images.yml'
            exporters:
              - 'packages/cli/templates/monitoring/**'
              - '.github/workflows/build-images.yml'

  build-dashboard:
    needs: filter
    if: needs.filter.outputs.dashboard == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.platform == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm64' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [amd64, arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'arm64' && false # Disabled as we use native ARM runner
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Dashboard
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard
          tags: |
            type=sha,prefix=${{ matrix.platform }}-

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/dashboard
          target: production
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create manifest list and push
        run: |
          # Combine the two separate arch tags into a single manifest
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
          SHA_PREFIX="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          # Source images
          # Note: metadata-action default sha tag format is sha-abcdef7
          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:amd64-${SHA_PREFIX}"
          ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:arm64-${SHA_PREFIX}"

          # Create and push combined manifest for each tag
          for tag in $TAGS; do
            docker buildx imagetools create -t $tag $AMD64_IMAGE $ARM64_IMAGE
          done

  build-exporters:
    needs: filter
    if: needs.filter.outputs.exporters == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        exporter: [db_exporter, log_exporter]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.exporter }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.exporter }} image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/cli/templates/monitoring/${{ matrix.exporter }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-auth-sidecar:
    needs: filter
    if: needs.filter.outputs.auth == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for auth-sidecar
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push auth-sidecar image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/cli/templates/auth-sidecar
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-mcp:
    needs: filter
    if: needs.filter.outputs.mcp == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MCP
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/mcp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
