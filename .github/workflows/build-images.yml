name: Build Docker Images (Hybrid CI)

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build all images"
        type: boolean
        default: false
      service:
        description: "Specific service to build"
        type: choice
        options:
          - all
          - dashboard
          - mcp
          - auth
          - exporters
        default: all
  workflow_call:
    inputs:
      tag:
        description: "Docker tag to push (e.g., staging)"
        type: string
        required: true
      force_build:
        description: "Force build all images"
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/cybermem

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      mcp: ${{ steps.filter.outputs.mcp }}
      auth: ${{ steps.filter.outputs.auth }}
      exporters: ${{ steps.filter.outputs.exporters }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'packages/dashboard/**'
              - '.github/workflows/build-images.yml'
            mcp:
              - 'packages/mcp/**'
              - '.github/workflows/build-images.yml'
            auth:
              - 'packages/cli/templates/auth-sidecar/**'
              - '.github/workflows/build-images.yml'
            exporters:
              - 'packages/cli/templates/monitoring/**'
              - '.github/workflows/build-images.yml'

      - name: Generate Filter Summary
        run: |
          echo "### 🔍 Filtering Results" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Build Triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | ${{ steps.filter.outputs.dashboard == 'true' || inputs.force_build || inputs.service == 'dashboard' || inputs.service == 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP | ${{ steps.filter.outputs.mcp == 'true' || inputs.force_build || inputs.service == 'mcp' || inputs.service == 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | ${{ steps.filter.outputs.auth == 'true' || inputs.force_build || inputs.service == 'auth' || inputs.service == 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Exporters | ${{ steps.filter.outputs.exporters == 'true' || inputs.force_build || inputs.service == 'exporters' || inputs.service == 'all' }} |" >> $GITHUB_STEP_SUMMARY

  build-dashboard:
    needs: filter
    if: needs.filter.outputs.dashboard == 'true' || inputs.force_build || inputs.service == 'dashboard' || inputs.service == 'all'
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Only needed if we are building for ARM64 on an X64 runner
        if: matrix.platform == 'arm64' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Dashboard
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard
          tags: |
            type=sha,prefix=${{ matrix.platform }}-sha-

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/dashboard
          target: production
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "### 📦 Dashboard Build: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "Successfully pushed \`${{ matrix.platform }}\` image to GHCR." >> $GITHUB_STEP_SUMMARY

  merge-dashboard:
    needs: build-dashboard
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Create manifest list and push
        run: |
          # Combine the two separate arch tags into a single manifest
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
          SHA_PREFIX="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          # Source images
          # Note: metadata-action default sha tag format is sha-abcdef7
          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:amd64-${SHA_PREFIX}"
          ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:arm64-${SHA_PREFIX}"

          # Create and push combined manifest for each tag
          for tag in $TAGS; do
            echo "Creating manifest for tag: $tag"
            docker buildx imagetools create -t $tag $AMD64_IMAGE $ARM64_IMAGE
          done

      - name: Final Summary
        run: |
          echo "### 🚀 Multi-Arch Manifest Created" >> $GITHUB_STEP_SUMMARY
          echo "The Dashboard is now available as a multi-architecture image (amd64/arm64)." >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:latest\`" >> $GITHUB_STEP_SUMMARY

  build-exporters:
    needs: filter
    if: needs.filter.outputs.exporters == 'true' || inputs.force_build || inputs.service == 'exporters' || inputs.service == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        exporter: [db_exporter, log_exporter]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.exporter }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push ${{ matrix.exporter }} image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/cli/templates/monitoring/${{ matrix.exporter }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "### 📦 Exporter Build: ${{ matrix.exporter }}" >> $GITHUB_STEP_SUMMARY
          echo "Successfully pushed multi-arch image (amd64/arm64) to GHCR." >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.exporter }}:latest\`" >> $GITHUB_STEP_SUMMARY

  build-auth-sidecar:
    needs: filter
    if: needs.filter.outputs.auth == 'true' || inputs.force_build || inputs.service == 'auth' || inputs.service == 'all'
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'arm64' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for auth-sidecar
        id: meta-auth
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar
          tags: |
            type=sha,prefix=${{ matrix.platform }}-sha-

      - name: Build and push auth-sidecar image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/cli/templates/auth-sidecar
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-auth.outputs.tags }}
          labels: ${{ steps.meta-auth.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "### 🛡️ Auth-Sidecar Build: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "Successfully pushed \`${{ matrix.platform }}\` image to GHCR." >> $GITHUB_STEP_SUMMARY

  merge-auth-sidecar:
    needs: build-auth-sidecar
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Create manifest list and push
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
          SHA_PREFIX="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar:amd64-${SHA_PREFIX}"
          ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar:arm64-${SHA_PREFIX}"

          for tag in $TAGS; do
            echo "Creating manifest for tag: $tag"
            docker buildx imagetools create -t $tag $AMD64_IMAGE $ARM64_IMAGE
          done

      - name: Final Summary
        run: |
          echo "### 🚀 Multi-Arch Manifest Created" >> $GITHUB_STEP_SUMMARY
          echo "Auth-Sidecar is now available as a multi-architecture image (amd64/arm64)." >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-auth-sidecar:latest\`" >> $GITHUB_STEP_SUMMARY

  build-mcp:
    needs: filter
    if: needs.filter.outputs.mcp == 'true' || inputs.force_build || inputs.service == 'mcp' || inputs.service == 'all'
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'arm64' && runner.arch == 'X64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp
          tags: |
            type=sha,prefix=${{ matrix.platform }}-sha-

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: ./packages/mcp
          platforms: linux/${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "### 🧩 MCP Build: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "Successfully pushed \`${{ matrix.platform }}\` image to GHCR." >> $GITHUB_STEP_SUMMARY

  merge-mcp:
    needs: build-mcp
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Create manifest list and push
        run: |
          # Combine the two separate arch tags into a single manifest
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ')
          SHA_PREFIX="sha-$(echo ${{ github.sha }} | cut -c1-7)"

          # Source images
          AMD64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp:amd64-${SHA_PREFIX}"
          ARM64_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp:arm64-${SHA_PREFIX}"

          # Create and push combined manifest for each tag
          for tag in $TAGS; do
            echo "Creating manifest for tag: $tag"
            docker buildx imagetools create -t $tag $AMD64_IMAGE $ARM64_IMAGE
          done

      - name: Final Summary
        run: |
          echo "### 🚀 Multi-Arch Manifest Created" >> $GITHUB_STEP_SUMMARY
          echo "The MCP Server is now available as a multi-architecture image (amd64/arm64)." >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-mcp:latest\`" >> $GITHUB_STEP_SUMMARY
