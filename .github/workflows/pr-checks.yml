name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dashboard Dependencies
        run: |
          cd packages/dashboard
          npm ci

      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint

      - name: Build Dashboard
        run: |
          cd packages/dashboard
          npm run build

  e2e:
    name: E2E Verification
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start Docker Stack (Local Simulation)
        working-directory: packages/cli/templates
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          mkdir -p ~/.cybermem/data
          # Secrets handling: Create file, but NO volume mount needed (handled by fix)
          mkdir -p secrets
          echo "sk-test-key-for-ci" > secrets/om_api_key
          export CYBERMEM_ENV_PATH=$HOME/.cybermem/.env
          docker compose up -d
          sleep 45

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Uniform Verification Matrix (CI Mode)
        run: npm run test:e2e:ci
        env:
          CI: true
          OM_API_KEY: sk-test-key-for-ci # gitleaks:allow

      - name: Verify MCP STDIO Protocol
        env:
          OM_DB_PATH: /tmp/test-mcp.db
          CYBERMEM_ENV: local
        run: |
          cd packages/mcp
          npm run build --silent
          # Debug: check if it runs at all
          # node dist/index.js --help || true

          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"ci-stdio-test","version":"1.0"},"capabilities":{}}}' | \
          node dist/index.js 2>&1 | grep -q '"serverInfo"' || (echo "❌ MCP STDIO Protocol Check Failed" && exit 1)
          echo "✅ MCP STDIO Protocol Verified"

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: release-reports/release-report-*-assets/
          retention-days: 7
