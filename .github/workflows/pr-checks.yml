name: PR Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read
  pull-requests: write # For DangerJS
  packages: read # For ghcr.io access

jobs:
  quality:
    name: Quality Gates (Lint & Danger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Lint Dashboard
        run: |
          cd packages/dashboard
          npm run lint

      - name: DangerJS
        # Only run danger on PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx danger ci

  cli_tests:
    name: CLI Unit Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Build & Test CLI
        run: |
          npm run build -w @cybermem/cli
          # Add unit tests here if available, e.g. npm test -w @cybermem/cli
          # For now just verify build is clean

  e2e:
    name: E2E Verification
    needs: cli_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build CLI & Install CyberMem (Dogfooding)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          npm run build -w @cybermem/cli
          # Simulates user running 'npx @cybermem/cli install'
          node packages/cli/dist/index.js install --staging

          # Wait for health
          sleep 30

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Uniform Verification Matrix (CI Mode)
        # Using localhost-prod (or staging) as requested
        run: |
          # Load the key generated by install (or env file)
          export OM_API_KEY=$(grep OM_API_KEY ~/.cybermem/.env | cut -d '=' -f2)
          # Override E2E check to point to the started instance
          npm run test:e2e:ci
        env:
          CI: true

      - name: Verify MCP STDIO Protocol
        env:
          OM_DB_PATH: /tmp/test-mcp.db
          CYBERMEM_ENV: local
          CYBERMEM_INSTANCE: local
        run: |
          cd packages/mcp
          npm run build --silent
          # Run with timeout to prevent hang. Capture stdout and stderr separately.
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","clientInfo":{"name":"ci-stdio-test","version":"1.0"},"capabilities":{}}}' | \
          timeout 10s node dist/index.js > stdout.log 2> stderr.log || true

          # Check if valid JSON-RPC response exists in stdout
          if grep -q '"serverInfo"' stdout.log; then
            echo "✅ MCP STDIO Protocol Verified"
          else
            echo "❌ MCP STDIO Protocol Check Failed"
            echo "--- STDOUT ---"
            cat stdout.log
            echo "--- STDERR ---"
            cat stderr.log
            exit 1
          fi

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: release-reports/release-report-*-assets/
          retention-days: 7
