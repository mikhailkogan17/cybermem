name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify [Unreleased] in Changelog
        run: |
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            if grep -A 10 "## \[Unreleased\]" CHANGELOG.md | grep -qE "^### (Added|Changed|Fixed|Removed|Security)"; then
              echo "✅ [Unreleased] section found and contains entries."
            else
              echo "❌ ERROR: [Unreleased] section is empty!"
              exit 1
            fi
          else
            echo "❌ ERROR: ## [Unreleased] header not found in CHANGELOG.md!"
            exit 1
          fi

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. BUILD & PUSH TO GHCR
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-prod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp
            image: cybermem-mcp
          - name: dashboard
            image: cybermem-dashboard
          - name: auth-sidecar
            image: cybermem-auth-sidecar
          - name: db-exporter
            image: cybermem-db_exporter
          - name: log-exporter
            image: cybermem-log_exporter
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push :latest
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # ==================================================================
  # 5. PUBLISH NPM
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get Current Version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Base version: $VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM (OIDC)
        run: npm publish --workspaces --access public --provenance

  # ==================================================================
  # 6. FINALIZE (Tag, Commit, GitHub Release, Slack)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version for Next Cycle
        id: next_version
        run: |
          npm version ${{ inputs.version_type }} --workspaces --include-workspace-root --no-git-tag-version
          NEW_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "next_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 Next version: $NEW_VERSION"

      - name: Extract Release Notes & Finalize Changelog
        id: notes
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # 1. Extract content from [Unreleased] section until next ## header
          # Uses awk to get lines between [Unreleased] and the first following ##
          awk '/## \[Unreleased\]/{flag=1;next}/## \[/{flag=0}flag' CHANGELOG.md > release_notes.md

          # 2. Finalize version in CHANGELOG.md
          sed -i "s/## \[Unreleased\]/## [$VERSION] - $DATE/" CHANGELOG.md

          # 3. Add fresh [Unreleased] section at the top
          sed -i 's/# Changelog/# Changelog\n\n## [Unreleased]\n/' CHANGELOG.md

          echo "Notes extracted to release_notes.md"

      - name: Download E2E Reports
        uses: actions/download-artifact@v4
        with:
          path: release-reports/${{ needs.publish-npm.outputs.version }}/release-report-${{ needs.publish-npm.outputs.version }}-assets

      - name: Commit & Push (Release + Bump)
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          NEXT_VERSION="${{ steps.next_version.outputs.next_version }}"

          git add packages/*/package.json package.json package-lock.json
          git add CHANGELOG.md
          git add "release-reports/${VERSION}" || true

          git commit -m "release: v${VERSION} → v${NEXT_VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release_notes.md

      - name: Slack (Publish Success)
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 *CyberMem v${{ needs.publish-npm.outputs.version }} Published!*\n✅ GHCR\n✅ NPM\n✅ GitHub Release"}' \
            $SLACK_WEBHOOK || true

  # ==================================================================
  # 7. DEPLOY PROD (Pull :latest from GHCR)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: [finalize, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          echo "Waiting for Tailscale..."
          TAILSCALE_CONNECTED=0
          for i in {1..12}; do
            sleep 5
            if tailscale status --json >/dev/null 2>&1; then
              TAILSCALE_CONNECTED=1
              break
            fi
          done

          if [ "$TAILSCALE_CONNECTED" -ne 1 ]; then
            echo "❌ Tailscale failed to connect"
            exit 1
          fi

          for i in {1..5}; do
            RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
            if [ -n "$RPI_IP" ]; then
              echo "ip=$RPI_IP" >> $GITHUB_OUTPUT
              echo "✅ RPi IP: $RPI_IP"
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Wait for GHCR Propagation
        run: sleep 30

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_ssh_pass=" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

      - name: Slack (Prod Deployed)
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *Production Deployed!* v${VERSION}\"}" \
            $SLACK_WEBHOOK || true

      - name: Slack (Prod Failed)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ *Prod Deploy Failed* v${VERSION} - Manual intervention required\"}" \
            $SLACK_WEBHOOK || true
