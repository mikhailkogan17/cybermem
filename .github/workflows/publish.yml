name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify [Unreleased] in Changelog
        run: |
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            if grep -A 10 "## \[Unreleased\]" CHANGELOG.md | grep -qE "^### (Added|Changed|Fixed|Removed|Security)"; then
              echo "✅ [Unreleased] section found and contains entries."
            else
              echo "❌ ERROR: [Unreleased] section is empty!"
              exit 1
            fi
          else
            echo "❌ ERROR: ## [Unreleased] header not found in CHANGELOG.md!"
            exit 1
          fi

