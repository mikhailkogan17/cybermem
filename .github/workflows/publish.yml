name: Publish

on:
  workflow_dispatch:

# Prevent concurrent publish workflows
concurrency:
  group: publish-workflow
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT - Check for pending changesets
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Prerequisites
        run: |
          # Patch-by-default: if no changesets exist, we'll auto-create a patch changeset later
          if [ -n "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "✅ Changesets found — will apply as-is (minor/major/patch per changeset)"
          else
            echo "✅ No changesets found — will auto-create patch bump"
          fi

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. PUBLISH NPM (Apply changesets, build, publish)
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: build-prod
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Apply changesets and resolve publishable version
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Patch-by-default: auto-create patch changeset if none exist
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "📝 No changesets found — creating automated patch bump"
            cat > .changeset/automated-patch.md << 'CHANGESET'
          ---
          "@cybermem/cli": patch
          "@cybermem/mcp": patch
          "@cybermem/dashboard": patch
          ---

          Automated patch version bump.
          CHANGESET
          fi

          # Apply changesets to bump versions
          npm run version
          npm install --package-lock-only
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "📦 Version after changesets: $VERSION"

          # Safety: check if this version is already published on npm
          NPM_CHECK_OUTPUT=$(npm view "@cybermem/cli@$VERSION" version 2>&1) || true
          if [ -n "$NPM_CHECK_OUTPUT" ] && echo "$NPM_CHECK_OUTPUT" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "⚠️ Version $VERSION already published on npm — auto-bumping patch"
            npm version patch --workspaces --no-git-tag-version
            npm install --package-lock-only
            VERSION=$(node -p "require('./packages/cli/package.json').version")
            echo "📦 Auto-bumped to: $VERSION"
          else
            echo "✅ Version $VERSION is not yet published"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify Slack (Publish Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.resolve.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")
          cat <<EOF > payload.json
          {
            "text": "🚀 CyberMem v${VERSION} Published!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 CyberMem v${VERSION} Published!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Packages Updated:*\n• <https://www.npmjs.com/package/@cybermem/cli|@cybermem/cli>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/mcp|@cybermem/mcp>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/dashboard|@cybermem/dashboard>: v${VERSION}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\nmain"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Date:*\n${DATE}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Workflow Run:*\n<${JOB_URL}|View Run>"
                }
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Publish Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.resolve.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "❌ CyberMem Publication Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "❌ CyberMem Publication Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION:-unknown}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

  # ==================================================================
  # 5. DEPLOY PROD (RPi) - Runs in parallel with finalize
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

      - name: Notify Slack (Deploy Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.publish-npm.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🍓 CyberMem v${VERSION} Deployed to RPi!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🍓 CyberMem v${VERSION} Deployed to RPi!"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\nrpi-ts-prod"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Deploy Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.publish-npm.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

  # ==================================================================
  # 6. FINALIZE (Atomic commit: Changeset versions, Reports via PR)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: [publish-npm, e2e]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch from fresh main
        id: branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ needs.publish-npm.outputs.version }}"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          BRANCH_NAME="release/v$CURRENT_VERSION-auto"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create release branch from latest origin/main (clean tree)
          git fetch origin main
          git checkout -b "$BRANCH_NAME" origin/main

      - name: Apply changesets and prepare release data
        id: prep
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ steps.branch.outputs.current_version }}"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Patch-by-default: auto-create patch changeset if none exist
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "📝 No changesets found — creating automated patch bump"
            cat > .changeset/automated-patch.md << 'CHANGESET'
          ---
          "@cybermem/cli": patch
          "@cybermem/mcp": patch
          "@cybermem/dashboard": patch
          ---

          Automated patch version bump.
          CHANGESET
          fi

          # Apply changesets — bumps versions in package.json
          npm run version
          npm install --package-lock-only
          echo "✅ Changesets applied"

          # Align package.json versions to match what was actually published
          CHANGESET_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$CHANGESET_VERSION" != "$CURRENT_VERSION" ]; then
            echo "📦 Aligning package versions: changesets=$CHANGESET_VERSION -> published=$CURRENT_VERSION"
            npm version "$CURRENT_VERSION" --workspaces --no-git-tag-version
            npm install --package-lock-only
          fi

          # Move CHANGELOG [Unreleased] → [VERSION]
          CHANGELOG_FILE="CHANGELOG.md"
          DATE=$(date +%Y-%m-%d)
          if [ -f "$CHANGELOG_FILE" ] && grep -q '\[Unreleased\]' "$CHANGELOG_FILE"; then
            echo "📝 Moving [Unreleased] to [$CURRENT_VERSION] in CHANGELOG.md"
            # Replace [Unreleased] header with [VERSION] - DATE, and add fresh [Unreleased]
            sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n### Changed\n\n### Fixed\n\n## [$CURRENT_VERSION] - $DATE/" "$CHANGELOG_FILE"
          fi

          # Extract release notes from root CHANGELOG.md (SSoT)
          if grep -q "## \[$CURRENT_VERSION\]" "$CHANGELOG_FILE"; then
            awk "/## \[$CURRENT_VERSION\]/,/^## \[/ {if (/## \[$CURRENT_VERSION\]/) next; if (/^## \[/) exit; print}" "$CHANGELOG_FILE" > release_notes_raw.md
            awk 'NF {p=1} p' release_notes_raw.md | awk '{a[NR]=$0} END {while(NR && !a[NR]) NR--; for(i=1;i<=NR;i++) print a[i]}' > release_notes.md
            rm -f release_notes_raw.md
          else
            echo "Automated release v$CURRENT_VERSION" > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            echo "Automated release for version $CURRENT_VERSION" > release_notes.md
          fi

          echo "📝 Release notes extracted (~$(wc -l < release_notes.md) lines)"

      - name: Ingest E2E Reports
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-reports-*
          path: release-reports/${{ steps.prep.outputs.current_version }}
          merge-multiple: true

      - name: Create release PR with auto-merge
        id: atomic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ steps.prep.outputs.current_version }}"
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"

          # Commit all changes (changeset-applied versions, CHANGELOGs, reports)
          git add .

          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit, skipping PR creation"
            echo "pr_url=" >> $GITHUB_OUTPUT
            exit 0
          fi

          git commit -m "chore: release v$CURRENT_VERSION [skip ci]"

          # Push with error handling
          if ! PUSH_OUTPUT=$(git push origin "$BRANCH_NAME" 2>&1); then
            echo "❌ ERROR: Failed to push release branch"
            echo "Check token permissions and branch protection rules."
            echo "$PUSH_OUTPUT"
            exit 1
          fi

          # Create PR with properly formatted body
          PR_BODY="Automated release PR for v${CURRENT_VERSION}

          This PR includes:
          - Changeset-applied version bumps and per-package CHANGELOGs
          - E2E test reports

          Auto-generated by publish workflow."

          if ! PR_URL=$(gh pr create \
            --title "chore: release v$CURRENT_VERSION" \
            --body "$PR_BODY" \
            --base main \
            --head "$BRANCH_NAME" 2>&1); then
            echo "❌ ERROR: Failed to create PR"
            echo "$PR_URL"
            exit 1
          fi

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          # Enable auto-merge with error handling
          if ! MERGE_OUTPUT=$(gh pr merge "$PR_URL" --auto --squash 2>&1); then
            echo "⚠️ WARNING: Could not enable auto-merge for PR"
            echo "The PR was created but auto-merge failed. Manual merge may be needed."
            echo "$MERGE_OUTPUT"
          else
            echo "✅ Auto-merge enabled successfully"
          fi

          echo "✅ Release PR created for v$CURRENT_VERSION"
          echo "PR URL: $PR_URL"

      - name: Create GitHub Release
        if: steps.atomic.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"

          # Tag and release immediately from main HEAD — don't wait for changelog PR
          # The PR will auto-merge when CI passes, but the release shouldn't block on it
          git fetch origin main
          git tag "v$VERSION" origin/main
          git push origin "v$VERSION"

          # Create GitHub Release
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main

      - name: Slack Notifications
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          RESULT="${{ job.status }}"
          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ *CyberMem v${VERSION} Live!* Release & reports committed. NPM Updated. Deployed to RPi."
          else
            MESSAGE="⚠️ *CyberMem Release Issues!* v${VERSION:-unknown} - Check CI logs."
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            "$SLACK_WEBHOOK" || true

  # ==================================================================
  # 7. LINEAR SYNC (Tag issues with deployed version) — FAILABLE
  # ==================================================================
  linear-sync:
    name: "linear-sync"
    needs: [publish-npm, deploy-prod, finalize]
    if: always() && needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Linear issue IDs from commits
        id: issues
        run: bash scripts/ci/linear-extract-issues.sh "${{ needs.publish-npm.outputs.version }}"

      - name: Comment on Linear issues with version
        if: steps.issues.outputs.issues != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          bash scripts/ci/linear-comment.sh \
            "${{ steps.issues.outputs.version }}" \
            "${{ steps.issues.outputs.issues }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Update Slack with issue list
        if: steps.issues.outputs.issues != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          bash scripts/ci/slack-issue-list.sh \
            "${{ steps.issues.outputs.version }}" \
            "${{ steps.issues.outputs.issues }}"
