name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Bump type (patch, minor, major, none)"
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch

# Prevent concurrent publish workflows
concurrency:
  group: publish-workflow
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT - Check for pending changesets
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changesets Exist
        run: |
          # If version_type is NOT 'none', we will auto-generate a changeset if needed.
          # If version_type IS 'none', we require existing changesets if we want to publish.
          if [ "${{ github.event.inputs.version_type }}" != "none" ] && [ "${{ github.event.inputs.version_type }}" != "" ]; then
            echo "✅ version_type is '${{ github.event.inputs.version_type }}'; proceeding with auto-changeset capability."
            exit 0
          fi

          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "❌ ERROR: No changesets found! Please create one with 'npm run changeset' or use workflow_dispatch with a version_type."
            exit 1
          fi
          echo "✅ Changesets found and ready to publish."

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. DEPLOY GHCR (Pull latest and push)
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-prod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp
            image: cybermem-mcp
          - name: dashboard
            image: cybermem-dashboard
          - name: auth-sidecar
            image: cybermem-auth-sidecar
          - name: db-exporter
            image: cybermem-db_exporter
          - name: log-exporter
            image: cybermem-log_exporter
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push :latest
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # ==================================================================
  # 5. VERSION BUMP (Apply changesets and create PR)
  # ==================================================================
  version-bump:
    name: "version:bump"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      has_changesets: ${{ steps.check.outputs.has_changesets }}
      pr_number: ${{ steps.cpr.outputs.pull-request-number }}
      pr_head_sha: ${{ steps.cpr.outputs.pull-request-head-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESETS_GITHUB_ACCESS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Check for changesets
        id: check
        run: |
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changesets to apply"
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT
            echo "✅ Changesets found"
          fi

      - name: Configure Git
        if: steps.check.outputs.has_changesets == 'true' || github.event.inputs.version_type != 'none'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply Changesets Version Bump
        id: apply_version
        if: steps.check.outputs.has_changesets == 'true' || github.event.inputs.version_type != 'none'
        run: |
          # If version_type is provided and no changesets exist, create an automated one
          if [ "${{ github.event.inputs.version_type }}" != "none" ] && [ "${{ github.event.inputs.version_type }}" != "" ]; then
            if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
              echo "---" > .changeset/automated-bump.md
              echo "\"@cybermem/cli\": ${{ github.event.inputs.version_type }}" >> .changeset/automated-bump.md
              echo "\"@cybermem/mcp\": ${{ github.event.inputs.version_type }}" >> .changeset/automated-bump.md
              echo "\"@cybermem/dashboard\": ${{ github.event.inputs.version_type }}" >> .changeset/automated-bump.md
              echo "---" >> .changeset/automated-bump.md
              echo "Automated release for ${{ github.event.inputs.version_type }} version bump." >> .changeset/automated-bump.md
            fi
          fi

          # Apply changesets
          npm run version
          npm install --package-lock-only

      - name: Get New Version
        id: get_version
        run: |
          NEW_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: cpr
        if: steps.check.outputs.has_changesets == 'true' || github.event.inputs.version_type != 'none'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CHANGESETS_GITHUB_ACCESS_TOKEN }}
          commit-message: "chore: version bump to v${{ steps.get_version.outputs.version }}"
          title: "chore: release v${{ steps.get_version.outputs.version }}"
          body: |
            Automated version bump to v${{ steps.get_version.outputs.version }} by publish workflow.

            **Includes:**
            - Version bump (changesets applied)
            - Updated CHANGELOG.md
          branch: "release/v${{ steps.get_version.outputs.version }}"
          base: "main"
          delete-branch: true

  # ==================================================================
  # 6. WAIT AND MERGE (Auto-merge PR after checks)
  # ==================================================================
  merge-pr:
    name: "merge:pr"
    needs: version-bump
    if: needs.version-bump.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    outputs:
      merge_commit_sha: ${{ steps.automerge.outputs.mergeCommitSha }}
    steps:
      - name: Wait for Status Checks
        uses: poseidon/wait-for-status-checks@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.version-bump.outputs.pr_head_sha }}
          interval: 10
          timeout: 600 # 10 minutes

      - name: Auto Merge
        id: automerge
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ needs.version-bump.outputs.pr_number }}
          MERGE_LABELS: "" # allow merging without specific labels
          MERGE_METHOD: "squash"
          MERGE_COMMIT_MESSAGE: "pull-request-title"
          MERGE_RETRIES: "20"
          MERGE_RETRY_SLEEP: "10000"

  # ==================================================================
  # 7. PUBLISH NPM
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: [version-bump, merge-pr]
    if: needs.version-bump.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.merge-pr.outputs.merge_commit_sha }} # Use merge commit SHA after PR is merged

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==================================================================
  # 8. DEPLOY PROD (RPi)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: [version-bump, merge-pr, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

  # ==================================================================
  # 9. FINALIZE (Tag, GitHub Release, Reports)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: [version-bump, merge-pr, publish-npm, deploy-prod, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.merge-pr.outputs.merge_commit_sha }} # Use merge commit SHA after PR is merged

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get Version and Extract Release Notes
        id: prep
        run: |
          VERSION="${{ needs.version-bump.outputs.version }}"
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release version: $VERSION"

          # Extract release notes from CLI package CHANGELOG.md (changesets creates package-level CHANGELOGs)
          # Only extract the current version section, not all previous releases
          CHANGELOG_FILE="packages/cli/CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ] && grep -q "## $VERSION" "$CHANGELOG_FILE"; then
            # Extract only the section for this version (between ## VERSION and the next ## heading)
            awk "/## $VERSION/,/^## / {if (/^## $VERSION/) next; if (/^## /) exit; print}" "$CHANGELOG_FILE" > release_notes_raw.md

            # Remove leading and trailing empty lines for clean release notes
            # First awk: Skip lines until first non-empty (removes leading blanks)
            # Second awk: Store all lines, then print up to last non-empty (removes trailing blanks)
            awk 'NF {p=1} p' release_notes_raw.md | awk '{a[NR]=$0} END {while(NR && !a[NR]) NR--; for(i=1;i<=NR;i++) print a[i]}' > release_notes.md
            rm -f release_notes_raw.md
          else
            echo "Release $VERSION" > release_notes.md
          fi

          # Ensure we have some content
          if [ ! -s release_notes.md ]; then
            echo "Automated release for version $VERSION" > release_notes.md
          fi

          # Log the extracted content (line count is approximate for logging only)
          echo "📝 Release notes extracted (~$(wc -l < release_notes.md) lines)"

      - name: Ingest E2E Reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: release-reports/${{ steps.prep.outputs.current_version }}
          merge-multiple: true

      - name: Commit E2E Reports
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"

          # Commit reports if there are any
          git add release-reports/ || true
          git commit -m "chore: add release reports for v$VERSION [skip ci]" || echo "No reports to commit"
          git push origin main || echo "No changes to push"

      - name: Create Git Tag
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"

          # Create and push Tag for VERSION
          git tag "v$VERSION" || echo "Tag already exists"
          git push origin "v$VERSION" || echo "Tag already pushed"
          echo "✅ Tag v$VERSION created"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main

      - name: Slack Notifications
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          RESULT="${{ job.status }}"
          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ *CyberMem v${VERSION} Live!* Release & reports committed. NPM Updated. Deployed to RPi."
          else
            MESSAGE="⚠️ *CyberMem Release Issues!* v${VERSION:-unknown} - Check CI logs."
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK || true
