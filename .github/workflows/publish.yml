name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changelog Updated
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "✅ No previous tags found, skipping changelog check"
            exit 0
          fi
          if git diff --name-only "$LAST_TAG" HEAD | grep -q "CHANGELOG.md"; then
            echo "✅ CHANGELOG.md was updated since $LAST_TAG"
          else
            echo "❌ ERROR: CHANGELOG.md was NOT updated since $LAST_TAG!"
            exit 1
          fi

  # ==================================================================
  # 2. BUILD STAGING IMAGES (Reusable Workflow)
  # ==================================================================
  build-staging:
    name: "build:staging"
    needs: check-prereqs
    uses: ./.github/workflows/build-images.yml
    with:
      tag: staging
      force_build: true
    secrets: inherit

  # ==================================================================
  # 3. DEPLOY STAGING (AMD64 Runner emulates RPi with Tailscale)
  # ==================================================================
  # ==================================================================
  # 5. BUILD ARM64 FOR PRODUCTION (RPi Runner Only)
  # ==================================================================
  build-arm64-prod:
    name: "build:arm64-prod"
    needs: build-staging
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 6. PUSH :latest TO GHCR (After ARM64 Build)
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-arm64-prod
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Multi-Arch Images
        run: |
          echo "✅ Multi-arch images (amd64/arm64) built and pushed as :latest"
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/cybermem-dashboard:latest

  # ==================================================================
  # 7. PUBLISH NPM
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Versions
        id: version
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm version ${{ inputs.version_type }} --no-git-tag-version)
          done
          NEW_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 New version: $NEW_VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM (OIDC)
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm publish --access public --provenance)
          done

  # ==================================================================
  # 8. FINALIZE (Tag, Commit, GitHub Release, Slack)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Versions (for commit)
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm version ${{ inputs.version_type }} --no-git-tag-version)
          done

      - name: Download E2E Reports
        uses: actions/download-artifact@v4
        with:
          name: e2e-reports-staging
          path: release-reports/v${{ needs.publish-npm.outputs.version }}

      - name: Commit Version Bump & Reports
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          git add packages/*/package.json
          git add "release-reports/v${VERSION}" || true
          git commit -m "release: v${VERSION}" || echo "Nothing to commit"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.publish-npm.outputs.version }}" \
            --title "v${{ needs.publish-npm.outputs.version }}" \
            --generate-notes

      - name: Slack (Publish Success)
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 *CyberMem v${{ needs.publish-npm.outputs.version }} Published!*\n✅ GHCR\n✅ NPM\n✅ GitHub Release"}' \
            $SLACK_WEBHOOK || true

  # ==================================================================
  # 9. DEPLOY PROD (Pull :latest from GHCR to RPi)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: [finalize, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # Verify Tailscale Connectivity and Network
      - name: Verify Tailscale Connectivity
        run: |
          echo "=== Tailscale Status ==="
          tailscale status --json | jq '.'

          echo ""
          echo "=== Network Check ==="
          tailscale netcheck

          echo ""
          echo "=== Node Info ==="
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          echo "Node DNS: ${MY_DNS}"
          echo "✅ Tailscale connectivity verified"

      - name: Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          echo "Waiting for Tailscale..."
          TAILSCALE_CONNECTED=0
          for i in {1..12}; do
            sleep 5
            if tailscale status --json >/dev/null 2>&1; then
              TAILSCALE_CONNECTED=1
              break
            fi
          done

          if [ "$TAILSCALE_CONNECTED" -ne 1 ]; then
            echo "❌ Tailscale failed to connect"
            exit 1
          fi

          for i in {1..5}; do
            RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
            if [ -n "$RPI_IP" ]; then
              echo "ip=$RPI_IP" >> $GITHUB_OUTPUT
              echo "✅ RPi IP: $RPI_IP"
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Wait for GHCR Propagation
        run: sleep 30

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=true" \
            --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}"

      - name: Slack (Prod Deployed)
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *Production Deployed!* v${VERSION}\"}" \
            $SLACK_WEBHOOK || true

      - name: Slack (Prod Failed)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ *Prod Deploy Failed* v${VERSION} - Manual intervention required\"}" \
            $SLACK_WEBHOOK || true
