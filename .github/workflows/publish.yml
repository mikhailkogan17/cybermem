name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Bump type (patch, minor, major, none)"
        type: choice
        options:
          - patch
          - minor
          - major
          - none
        default: patch

# Prevent concurrent publish workflows
concurrency:
  group: publish-workflow
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT - Check for pending changesets
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changesets Exist
        run: |
          # If version_type is NOT 'none', we will auto-generate a changeset if needed.
          # If version_type IS 'none', we require existing changesets if we want to publish.
          if [ "${{ github.event.inputs.version_type }}" != "none" ] && [ "${{ github.event.inputs.version_type }}" != "" ]; then
            echo "✅ version_type is '${{ github.event.inputs.version_type }}'; proceeding with auto-changeset capability."
            exit 0
          fi

          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "❌ ERROR: No changesets found! Please create one with 'npm run changeset' or use workflow_dispatch with a version_type."
            exit 1
          fi
          echo "✅ Changesets found and ready to publish."

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. PUBLISH NPM (Apply changesets, build, publish)
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: build-prod
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Apply changesets and resolve publishable version
        id: resolve
        run: |
          # Auto-generate changeset if version_type is provided and no changesets exist
          if [ "${{ github.event.inputs.version_type }}" != "none" ] && [ "${{ github.event.inputs.version_type }}" != "" ]; then
            if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
              echo "📝 Creating automated changeset for ${{ github.event.inputs.version_type }} bump"
              cat > .changeset/automated-bump.md << 'CHANGESET'
          ---
          "@cybermem/cli": ${{ github.event.inputs.version_type }}
          "@cybermem/mcp": ${{ github.event.inputs.version_type }}
          "@cybermem/dashboard": ${{ github.event.inputs.version_type }}
          ---

          Automated ${{ github.event.inputs.version_type }} version bump.
          CHANGESET
            fi
          fi

          # Check for changesets
          if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo "⚠️ No changesets to apply"
            echo "has_changesets=false" >> $GITHUB_OUTPUT
            # Use current version as-is
            VERSION=$(node -p "require('./packages/cli/package.json').version")
          else
            echo "has_changesets=true" >> $GITHUB_OUTPUT

            # Apply changesets to bump versions and update per-package CHANGELOGs
            npm run version

            # Regenerate package-lock.json to reflect updated package.json files
            npm install --package-lock-only

            VERSION=$(node -p "require('./packages/cli/package.json').version")
            echo "📦 Version after changesets: $VERSION"
          fi

          # Check if this version is already published on npm
          NPM_CHECK_OUTPUT=$(npm view "@cybermem/cli@$VERSION" version 2>&1) || true
          if [ -n "$NPM_CHECK_OUTPUT" ] && echo "$NPM_CHECK_OUTPUT" | grep -qE "^[0-9]+\.[0-9]+\.[0-9]+"; then
            echo "⚠️ Version $VERSION already published on npm — auto-bumping patch"

            # Bump patch across all workspaces (no git tag)
            npm version patch --workspaces --no-git-tag-version
            npm install --package-lock-only

            VERSION=$(node -p "require('./packages/cli/package.json').version")
            echo "📦 Auto-bumped to: $VERSION"
            echo "auto_bumped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Version $VERSION is not yet published"
            echo "auto_bumped=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Publishing version: $VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify Slack (Publish Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.resolve.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")
          cat <<EOF > payload.json
          {
            "text": "🚀 CyberMem v${VERSION} Published!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 CyberMem v${VERSION} Published!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Packages Updated:*\n• <https://www.npmjs.com/package/@cybermem/cli|@cybermem/cli>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/mcp|@cybermem/mcp>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/dashboard|@cybermem/dashboard>: v${VERSION}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\nmain"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Date:*\n${DATE}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Workflow Run:*\n<${JOB_URL}|View Run>"
                }
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Publish Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.resolve.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "❌ CyberMem Publication Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "❌ CyberMem Publication Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION:-unknown}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

  # ==================================================================
  # 5. DEPLOY PROD (RPi) - Runs in parallel with finalize
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

      - name: Notify Slack (Deploy Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.publish-npm.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🍓 CyberMem v${VERSION} Deployed to RPi!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🍓 CyberMem v${VERSION} Deployed to RPi!"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\nrpi-ts-prod"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Deploy Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.publish-npm.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

  # ==================================================================
  # 6. FINALIZE (Atomic commit: Changeset versions, Reports via PR)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: [publish-npm, e2e]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Apply changesets and prepare release data
        id: prep
        run: |
          CURRENT_VERSION="${{ needs.publish-npm.outputs.version }}"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Auto-generate changeset if version_type is provided and no changesets exist
          if [ "${{ github.event.inputs.version_type }}" != "none" ] && [ "${{ github.event.inputs.version_type }}" != "" ]; then
            if [ -z "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
              echo "📝 Creating automated changeset for ${{ github.event.inputs.version_type }} bump"
              cat > .changeset/automated-bump.md << 'CHANGESET'
          ---
          "@cybermem/cli": ${{ github.event.inputs.version_type }}
          "@cybermem/mcp": ${{ github.event.inputs.version_type }}
          "@cybermem/dashboard": ${{ github.event.inputs.version_type }}
          ---

          Automated ${{ github.event.inputs.version_type }} version bump.
          CHANGESET
            fi
          fi

          # Apply changesets — this bumps versions in package.json files and generates per-package CHANGELOGs
          if [ -n "$(ls -A .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            npm run version
            npm install --package-lock-only
            echo "✅ Changesets applied"
          else
            echo "⚠️ No changesets to apply"
          fi

          # If the published version differs from what changesets produced (auto-bump case),
          # ensure package.json files match the published version
          CHANGESET_VERSION=$(node -p "require('./packages/cli/package.json').version")
          if [ "$CHANGESET_VERSION" != "$CURRENT_VERSION" ]; then
            echo "📦 Aligning package versions: changesets=$CHANGESET_VERSION -> published=$CURRENT_VERSION"
            npm version "$CURRENT_VERSION" --workspaces --no-git-tag-version
            npm install --package-lock-only
          fi

          # Extract release notes from CLI package CHANGELOG.md (changesets creates package-level CHANGELOGs)
          # 1. awk: extract content between "## VERSION" and the next "## " header
          # 2. awk: strip leading blank lines (skip until first non-empty)
          # 3. awk: strip trailing blank lines (buffer all, print up to last non-empty)
          CHANGELOG_FILE="packages/cli/CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ] && grep -q "## $CURRENT_VERSION" "$CHANGELOG_FILE"; then
            awk "/## $CURRENT_VERSION/,/^## / {if (/^## $CURRENT_VERSION/) next; if (/^## /) exit; print}" "$CHANGELOG_FILE" > release_notes_raw.md
            awk 'NF {p=1} p' release_notes_raw.md | awk '{a[NR]=$0} END {while(NR && !a[NR]) NR--; for(i=1;i<=NR;i++) print a[i]}' > release_notes.md
            rm -f release_notes_raw.md
          else
            echo "Automated release v$CURRENT_VERSION" > release_notes.md
          fi

          if [ ! -s release_notes.md ]; then
            echo "Automated release for version $CURRENT_VERSION" > release_notes.md
          fi

          echo "📝 Release notes extracted (~$(wc -l < release_notes.md) lines)"

      - name: Ingest E2E Reports
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-reports-*
          path: release-reports/${{ steps.prep.outputs.current_version }}
          merge-multiple: true

      - name: Create release PR with auto-merge
        id: atomic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION="${{ steps.prep.outputs.current_version }}"

          # Create a release branch
          BRANCH_NAME="release/v$CURRENT_VERSION-auto"
          git checkout -b "$BRANCH_NAME"

          # Commit all changes (changeset-applied versions, CHANGELOGs, reports)
          git add .
          git commit -m "chore: release v$CURRENT_VERSION [skip ci]"
          git push origin "$BRANCH_NAME"

          # Create PR and capture PR URL
          PR_URL=$(gh pr create \
            --title "chore: release v$CURRENT_VERSION" \
            --body "Automated release PR for v$CURRENT_VERSION

          This PR includes:
          - Changeset-applied version bumps and per-package CHANGELOGs
          - E2E test reports

          Auto-generated by publish workflow." \
            --base main \
            --head "$BRANCH_NAME")

          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

          # Enable auto-merge
          gh pr merge "$PR_URL" --auto --squash

          echo "✅ Release PR created and auto-merge enabled for v$CURRENT_VERSION"
          echo "PR URL: $PR_URL"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          PR_URL="${{ steps.atomic.outputs.pr_url }}"

          # Wait for PR to be merged (poll for up to 10 minutes)
          echo "Waiting for PR to be merged..."
          echo "PR URL: $PR_URL"
          MAX_ATTEMPTS=60
          POLL_INTERVAL=10
          for i in $(seq 1 $MAX_ATTEMPTS); do
            PR_STATE=$(gh pr view "$PR_URL" --json state --jq '.state' 2>&1)
            if [ $? -ne 0 ]; then
              echo "⚠️ Failed to query PR state: $PR_STATE"
              PR_STATE="UNKNOWN"
            fi

            if [ "$PR_STATE" = "MERGED" ]; then
              echo "✅ PR merged successfully!"
              break
            elif [ "$PR_STATE" = "CLOSED" ]; then
              echo "❌ PR was closed without merging. Failing release creation."
              exit 1
            else
              echo "PR state: $PR_STATE, waiting... (attempt $i/$MAX_ATTEMPTS)"
              sleep $POLL_INTERVAL
            fi
          done

          if [ "$PR_STATE" != "MERGED" ]; then
            TOTAL_WAIT=$((MAX_ATTEMPTS * POLL_INTERVAL))
            echo "⚠️ PR merge timeout after ${TOTAL_WAIT}s ($MAX_ATTEMPTS attempts). Current state: $PR_STATE"
            exit 1
          fi

          # Create and push tag after merge, anchored to origin/main
          git fetch origin main
          git tag "v$VERSION" "origin/main"
          git push origin "v$VERSION"

          # Create GitHub Release
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main

      - name: Slack Notifications
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          RESULT="${{ job.status }}"
          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ *CyberMem v${VERSION} Live!* Release & reports committed. NPM Updated. Deployed to RPi."
          else
            MESSAGE="⚠️ *CyberMem Release Issues!* v${VERSION:-unknown} - Check CI logs."
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK || true
