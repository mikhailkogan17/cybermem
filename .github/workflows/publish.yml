name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify [Unreleased] in Changelog
        run: |
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            if grep -A 10 "## \[Unreleased\]" CHANGELOG.md | grep -qE "^### (Added|Changed|Fixed|Removed|Security)"; then
              echo "✅ [Unreleased] section found and contains entries."
            else
              echo "❌ ERROR: [Unreleased] section is empty!"
              exit 1
            fi
          else
            echo "❌ ERROR: ## [Unreleased] header not found in CHANGELOG.md!"
            exit 1
          fi

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. DEPLOY GHCR (Pull latest and push)
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-prod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: db-exporter
            image: cybermem-db_exporter
          - name: log-exporter
            image: cybermem-log_exporter
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push :latest
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # ==================================================================
  # 5. PUBLISH NPM (Uses CURRENT version from main)
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Get Current Version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Base version: $VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM (OIDC)
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Notify Slack (Publish Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          DATE=$(date "+%Y-%m-%d %H:%M:%S")
          cat <<EOF > payload.json
          {
            "text": "🚀 CyberMem v${VERSION} Published!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🚀 CyberMem v${VERSION} Published!"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Packages Updated:*\n• <https://www.npmjs.com/package/@cybermem/cli|@cybermem/cli>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/mcp|@cybermem/mcp>: v${VERSION}\n• <https://www.npmjs.com/package/@cybermem/dashboard|@cybermem/dashboard>: v${VERSION}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\nmain"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Date:*\n${DATE}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Workflow Run:*\n<${JOB_URL}|View Run>"
                }
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Publish Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ steps.version.outputs.version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "❌ CyberMem Publication Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "❌ CyberMem Publication Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION:-unknown}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

  # ==================================================================
  # 6. FINALIZE (Atomic commit: Changelog, Reports, Bump)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: [publish-npm, e2e]
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.prep.outputs.current_version }}
      next_version: ${{ steps.atomic.outputs.next_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare Release Data
        id: prep
        run: |
          CURRENT_VERSION="${{ needs.publish-npm.outputs.version }}"
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # Extract Release Notes from Section [Unreleased]
          awk '/## \[Unreleased\]/{flag=1; next} /^## \[ /{flag=0} flag' CHANGELOG.md | sed '/^$/d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No notes found. Defaulting to automated commit log." > release_notes.md
          fi

          # Rotate CHANGELOG.md for CURRENT_VERSION
          DATE=$(date +%Y-%m-%d)
          sed -i "s/## \[Unreleased\]/## [$CURRENT_VERSION] - $DATE/" CHANGELOG.md
          sed -i '4i\## [Unreleased]\n\n### Added\n\n### Changed\n\n### Fixed\n\n### Removed\n\n' CHANGELOG.md

      - name: Ingest E2E Reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: release-reports/${{ steps.prep.outputs.current_version }}
          merge-multiple: true

      - name: Atomic Update (Version Bump & Push)
        id: atomic
        run: |
          CURRENT_VERSION="${{ steps.prep.outputs.current_version }}"

          # Perform Version Bump across all workspaces
          npm version ${{ github.event.inputs.version_type }} --workspaces --no-git-tag-version
          NEXT_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT

          # Atomic Commit everything
          git add .
          git commit -m "chore: release v$CURRENT_VERSION and bump to v$NEXT_VERSION"
          git push origin main

          # Create and push Tag for CURRENT_VERSION
          git tag "v$CURRENT_VERSION"
          git push origin "v$CURRENT_VERSION"
          echo "✅ Atomic update finished for v$CURRENT_VERSION -> v$NEXT_VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.prep.outputs.current_version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main

  # ==================================================================
  # 7. DEPLOY PROD (RPi)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: finalize
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

      - name: Notify Slack (Deploy Success)
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.finalize.outputs.current_version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🍓 CyberMem v${VERSION} Deployed to RPi!",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🍓 CyberMem v${VERSION} Deployed to RPi!"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Environment:*\nrpi-ts-prod"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Job Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true

      - name: Notify Slack (Deploy Failure)
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          VERSION: ${{ needs.finalize.outputs.current_version }}
          JOB_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          cat <<EOF > payload.json
          {
            "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🥺 CyberMem v${VERSION} RPi Deployment Failed"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version:*\n${VERSION}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Run:*\n<${JOB_URL}|View Run>"
                  }
                ]
              }
            ]
          }
          EOF
          curl -X POST -H 'Content-type: application/json' --data @payload.json $SLACK_WEBHOOK || true
