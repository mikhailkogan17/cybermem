name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify [Unreleased] in Changelog
        run: |
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            if grep -A 10 "## \[Unreleased\]" CHANGELOG.md | grep -qE "^### (Added|Changed|Fixed|Removed|Security)"; then
              echo "✅ [Unreleased] section found and contains entries."
            else
              echo "❌ ERROR: [Unreleased] section is empty!"
              exit 1
            fi
          else
            echo "❌ ERROR: ## [Unreleased] header not found in CHANGELOG.md!"
            exit 1
          fi

  # ==================================================================
  # 2. E2E CHECKS
  # ==================================================================
  e2e:
    name: "e2e"
    needs: check-prereqs
    uses: ./.github/workflows/e2e.yml
    secrets: inherit

  # ==================================================================
  # 3. BUILD PRODUCTION IMAGES
  # ==================================================================
  build-prod:
    name: "build:prod"
    needs: e2e
    permissions:
      actions: read
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 4. DEPLOY GHCR (Pull latest and push)
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-prod
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mcp
            image: cybermem-mcp
          - name: dashboard
            image: cybermem-dashboard
          - name: auth-sidecar
            image: cybermem-auth-sidecar
          - name: db-exporter
            image: cybermem-db_exporter
          - name: log-exporter
            image: cybermem-log_exporter
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push :latest
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker tag ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest

  # ==================================================================
  # 5. PUBLISH NPM
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version Bump
        run: |
          npm version ${{ github.event.inputs.version_type }} --workspaces --no-git-tag-version
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          git add .
          git commit -m "chore: bump version to v$VERSION"
          git push origin main

      - name: Get Current Version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Base version: $VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM (OIDC)
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ==================================================================
  # 6. DEPLOY PROD (RPi)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.76.6

      - name: Setup Ansible + Tailscale SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          sudo cp tools/ts-ssh /usr/local/bin/ts-ssh
          sudo chmod +x /usr/local/bin/ts-ssh

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
          echo "ip=$RPI_IP" >> $GITHUB_OUTPUT

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=false" \
            --extra-vars "ansible_ssh_executable=/usr/local/bin/ts-ssh" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}" \
            --extra-vars "ansible_user=pi ansible_become_flags=-n ansible_timeout=60"

  # ==================================================================
  # 7. FINALIZE (Release Notes & Changelog Cleanup)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: [publish-npm, deploy-prod]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract Release Notes from CHANGELOG
        id: notes
        run: |
          # Extract everything between [Unreleased] and the next header
          awk '/## \[Unreleased\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md | sed '/^$/d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No notes found. Defaulting to automated commit log." > release_notes.md
          fi
          echo "Generated Release Notes:"
          cat release_notes.md

      - name: Finalize CHANGELOG.md
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          # Rename [Unreleased] to the new version
          sed -i "s/## \[Unreleased\]/## [$VERSION] - $DATE/" CHANGELOG.md
          # Insert a new [Unreleased] section at the top (after the main header)
          sed -i '4i\## [Unreleased]\n\n### Added\n\n### Changed\n\n### Fixed\n\n### Removed\n\n' CHANGELOG.md

          git add CHANGELOG.md
          git commit -m "chore: finalize CHANGELOG for v$VERSION"
          git push origin main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main

      - name: Slack Notifications
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          RESULT="${{ job.status }}"
          if [ "$RESULT" = "success" ]; then
            MESSAGE="✅ *CyberMem v${VERSION} Live!* GitHub Release & NPM Updated. Deployed to RPi."
          else
            MESSAGE="⚠️ *CyberMem v${VERSION} Release Issues!* Check CI logs."
          fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"$MESSAGE\"}" \
            $SLACK_WEBHOOK || true
