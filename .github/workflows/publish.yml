name: Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write
  packages: write

jobs:
  # ==================================================================
  # 1. PRE-FLIGHT
  # ==================================================================
  check-prereqs:
    name: "check-prereqs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changelog Updated
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "✅ No previous tags found, skipping changelog check"
            exit 0
          fi
          if git diff --name-only "$LAST_TAG" HEAD | grep -q "CHANGELOG.md"; then
            echo "✅ CHANGELOG.md was updated since $LAST_TAG"
          else
            echo "❌ ERROR: CHANGELOG.md was NOT updated since $LAST_TAG!"
            exit 1
          fi

  # ==================================================================
  # 2. BUILD STAGING IMAGES (Reusable Workflow)
  # ==================================================================
  build-staging:
    name: "build:staging"
    needs: check-prereqs
    uses: ./.github/workflows/build-images.yml
    with:
      tag: staging
      force_build: true
    secrets: inherit

  # ==================================================================
  # 3. DEPLOY STAGING (AMD64 Runner emulates RPi with Tailscale)
  # ==================================================================
  deploy-staging:
    name: "deploy:rpi-ts-staging"
    needs: build-staging
    runs-on: ubuntu-latest
    outputs:
      staging_url: ${{ steps.get_url.outputs.url }}
      staging_token: ${{ steps.gen_token.outputs.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate Staging Token
        id: gen_token
        run: |
          # Generate token for staging E2E auth (same format as CLI)
          TOKEN="sk-$(openssl rand -hex 16)"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Generated staging token"

      - name: Setup Environment
        run: |
          mkdir -p ~/.cybermem
          echo "OPENAI_API_KEY=sk-test-key-for-ci" > ~/.cybermem/.env # gitleaks:allow
          echo "OM_API_KEY=sk-test-key-for-ci" >> ~/.cybermem/.env # gitleaks:allow

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: npm ci

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Wait for Tailscale Connection
        id: get_url
        run: |
          echo "Waiting for Tailscale connection..."
          TAILSCALE_CONNECTED=0
          for i in {1..12}; do
            sleep 5
            if tailscale status --json >/dev/null 2>&1; then
              echo "✅ Tailscale connected"
              TAILSCALE_CONNECTED=1
              break
            fi
            echo "Waiting... ($i/12)"
          done

          if [ "$TAILSCALE_CONNECTED" -ne 1 ]; then
            echo "❌ Tailscale failed to connect"
            exit 1
          fi

          # Get this runner's Tailscale DNS name for funnel
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          if [ -z "$MY_DNS" ]; then
            echo "❌ Could not determine Tailscale DNS name"
            tailscale status
            exit 1
          fi

          # Staging uses port 8443 for Tailscale Funnel
          FUNNEL_URL="https://${MY_DNS}:8443"
          echo "url=${FUNNEL_URL}" >> $GITHUB_OUTPUT
          echo "✅ Staging Funnel URL: ${FUNNEL_URL}"

      - name: Deploy Staging (Local deployment with CI mode)
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          PROJECT_NAME: cybermem-staging
          TRAEFIK_PORT: 8625
        run: |
          npm run build -w @cybermem/cli
          # Use --ci flag for local deployment
          node packages/cli/dist/index.js install --ci --staging

      - name: Configure Tailscale Funnel
        run: |
          echo "Setting up Tailscale Funnel..."

          # Step 1: Configure serve (ingress proxy)
          sudo tailscale serve https:8443 / http://127.0.0.1:8625

          # Step 2: Enable funnel (make it publicly accessible)
          sudo tailscale funnel --bg 8443

          # Verify configuration
          sudo tailscale funnel status
          sudo tailscale serve status

      - name: Wait for Services (localhost)
        run: |
          echo "Waiting for services to be healthy on localhost..."
          for i in {1..30}; do
            if curl -sf "http://localhost:8625/health" > /dev/null 2>&1; then
              echo "✅ Services ready on localhost"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "❌ Services failed to become healthy"
          exit 1

      - name: Verify Tailscale Funnel
        run: |
          echo "Verifying Tailscale Funnel setup..."
          MY_DNS=$(tailscale status --json | jq -r '.Self.DNSName' | sed 's/\.$//')
          FUNNEL_URL="https://${MY_DNS}:8443"
          echo "✅ Tailscale Funnel configured for external access at ${FUNNEL_URL}"
          echo "   (Tests will use localhost - same runner)"

  # ==================================================================
  # 4. E2E VERIFICATION
  # ==================================================================
  e2e-staging:
    name: "e2e:rpi-ts-staging"
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Build Local Packages
        run: npm run build --workspaces

      - name: Run E2E Verification
        id: run-e2e
        env:
          DASHBOARD_URL: ${{ needs.deploy-staging.outputs.staging_url }}
          MCP_URL: ${{ needs.deploy-staging.outputs.staging_url }}/mcp
          CYBERMEM_TOKEN: ${{ needs.deploy-staging.outputs.staging_token }}
          TEST_ENV_NAME: "rpi-ts-staging"
        run: |
          echo "Testing against: $DASHBOARD_URL"
          for i in {1..30}; do
            # Note: Tailscale Funnel provides valid certificates, no -k needed
            if curl -sf "${DASHBOARD_URL}/health" > /dev/null 2>&1; then
              echo "✅ Services ready"
              break
            fi
            echo "Waiting for services... ($i/30)"
            sleep 10
          done

          # Final health check to ensure services became ready
          curl -sf "${DASHBOARD_URL}/health" > /dev/null 2>&1 || { echo "❌ Services failed to become healthy"; exit 1; }

          cd packages/cli
          npm run test:e2e:dashboard:api
          npm run test:e2e:cli

      - name: Generate Report
        if: always()
        run: |
          mkdir -p release-report-staging
          TEST_STATUS="unknown"
          if [ "${{ steps.run-e2e.outcome }}" == "success" ]; then
            TEST_STATUS="passed"
          elif [ "${{ steps.run-e2e.outcome }}" == "failure" ]; then
            TEST_STATUS="failed"
          fi
          echo "# RPI-TS-STAGING Verification" > release-report-staging/RPI-TS-STAGING.md
          echo "**Date**: $(date -u +%Y-%m-%d)" >> release-report-staging/RPI-TS-STAGING.md
          echo "**URL**: ${{ needs.deploy-staging.outputs.staging_url }}" >> release-report-staging/RPI-TS-STAGING.md
          echo "**Status**: ${TEST_STATUS}" >> release-report-staging/RPI-TS-STAGING.md
          echo "**Note**: Deployed on AMD64 GitHub runner emulating RPi with Tailscale Funnel" >> release-report-staging/RPI-TS-STAGING.md

      - name: Slack (Staging Fail)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ *Publish Aborted: Staging E2E Failed*"}' \
            $SLACK_WEBHOOK || true

      - name: Upload E2E Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-staging
          path: |
            packages/*/playwright-report/
            packages/*/test-results/
            release-report-staging/
          retention-days: 14

  # ==================================================================
  # 5. BUILD ARM64 FOR PRODUCTION (RPi Runner Only)
  # ==================================================================
  build-arm64-prod:
    name: "build:arm64-prod"
    needs: e2e-staging
    uses: ./.github/workflows/build-images.yml
    with:
      tag: latest
      force_build: true
    secrets: inherit

  # ==================================================================
  # 6. PUSH :latest TO GHCR (After ARM64 Build)
  # ==================================================================
  deploy-ghcr:
    name: "deploy:ghcr"
    needs: build-arm64-prod
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Multi-Arch Images
        run: |
          echo "✅ Multi-arch images (amd64/arm64) built and pushed as :latest"
          docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/cybermem-dashboard:latest

  # ==================================================================
  # 7. PUBLISH NPM
  # ==================================================================
  publish-npm:
    name: "publish:npm"
    needs: deploy-ghcr
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Versions
        id: version
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm version ${{ inputs.version_type }} --no-git-tag-version)
          done
          NEW_VERSION=$(node -p "require('./packages/cli/package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "📦 New version: $NEW_VERSION"

      - name: Build Packages
        run: npm run build --workspaces

      - name: Publish to NPM (OIDC)
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm publish --access public --provenance)
          done

  # ==================================================================
  # 8. FINALIZE (Tag, Commit, GitHub Release, Slack)
  # ==================================================================
  finalize:
    name: "finalize"
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Versions (for commit)
        run: |
          for pkg in packages/cli packages/mcp packages/dashboard; do
             (cd $pkg && npm version ${{ inputs.version_type }} --no-git-tag-version)
          done

      - name: Download E2E Reports
        uses: actions/download-artifact@v4
        with:
          name: e2e-reports-staging
          path: release-reports/v${{ needs.publish-npm.outputs.version }}

      - name: Commit Version Bump & Reports
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          git add packages/*/package.json
          git add "release-reports/v${VERSION}" || true
          git commit -m "release: v${VERSION}" || echo "Nothing to commit"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.publish-npm.outputs.version }}" \
            --title "v${{ needs.publish-npm.outputs.version }}" \
            --generate-notes

      - name: Slack (Publish Success)
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 *CyberMem v${{ needs.publish-npm.outputs.version }} Published!*\n✅ GHCR\n✅ NPM\n✅ GitHub Release"}' \
            $SLACK_WEBHOOK || true

  # ==================================================================
  # 9. DEPLOY PROD (Pull :latest from GHCR to RPi)
  # ==================================================================
  deploy-prod:
    name: "deploy:rpi-ts-prod"
    needs: [finalize, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Get RPi Tailscale IP
        id: get_rpi_ip
        run: |
          echo "Waiting for Tailscale..."
          TAILSCALE_CONNECTED=0
          for i in {1..12}; do
            sleep 5
            if tailscale status --json >/dev/null 2>&1; then
              TAILSCALE_CONNECTED=1
              break
            fi
          done

          if [ "$TAILSCALE_CONNECTED" -ne 1 ]; then
            echo "❌ Tailscale failed to connect"
            exit 1
          fi

          for i in {1..5}; do
            RPI_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName | test("raspberrypi"; "i")) | .TailscaleIPs[0]' | head -1)
            if [ -n "$RPI_IP" ]; then
              echo "ip=$RPI_IP" >> $GITHUB_OUTPUT
              echo "✅ RPi IP: $RPI_IP"
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Wait for GHCR Propagation
        run: sleep 30

      - name: Deploy Prod (Pull :latest)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i packages/cli/templates/ansible/inventory/hosts.ini \
            packages/cli/templates/ansible/playbooks/deploy-cybermem.yml \
            --extra-vars "cybermem_env=prod ghcr_user=${{ github.actor }} ghcr_token=${{ secrets.GITHUB_TOKEN }} CYBERMEM_TAILSCALE=true" \
            --extra-vars "ansible_ssh_common_args='-o StrictHostKeyChecking=no'" \
            --extra-vars "ansible_host=${{ steps.get_rpi_ip.outputs.ip }}"

      - name: Slack (Prod Deployed)
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ *Production Deployed!* v${VERSION}\"}" \
            $SLACK_WEBHOOK || true

      - name: Slack (Prod Failed)
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VERSION="${{ needs.publish-npm.outputs.version }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ *Prod Deploy Failed* v${VERSION} - Manual intervention required\"}" \
            $SLACK_WEBHOOK || true
